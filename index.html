<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kart Bros 3D - Advanced Online WebRTC</title>
<style>
    :root {
        --primary: #ff3366;
        --primary-glow: rgba(255, 51, 102, 0.6);
        --bg-dark: #0a0a12;
        --bg-panel: #1a1a24;
        --text: #ffffff;
        --text-dim: #aaaaaa;
        --gold: #ffd700;
        --success: #00ff66;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-dark); color: var(--text); overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
    #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; display: flex; flex-direction: column; pointer-events: none; }
    .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; align-items: center; justify-content: center; flex-direction: column; background: radial-gradient(circle at center, #1a1a2a 0%, #05050a 100%); pointer-events: auto; }
    .screen.active { display: flex; }
    .panel { background: rgba(20, 20, 30, 0.9); border: 2px solid var(--primary); border-radius: 16px; padding: 40px; box-shadow: 0 0 30px var(--primary-glow); display: flex; flex-direction: column; align-items: center; min-width: 450px; backdrop-filter: blur(10px); }
    h1 { font-size: 4rem; text-transform: uppercase; font-weight: 900; font-style: italic; color: transparent; -webkit-text-stroke: 2px var(--primary); text-shadow: 0 0 20px var(--primary-glow); margin-bottom: 40px; letter-spacing: 2px; }
    h2 { font-size: 2rem; color: var(--text); margin-bottom: 20px; }
    h3 { font-size: 1.5rem; color: var(--text-dim); margin-bottom: 15px; }
    .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; }
    button { background: linear-gradient(45deg, #cc0033, var(--primary)); color: white; border: none; padding: 18px 24px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); outline: none; position: relative; overflow: hidden; }
    button::after { content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent); transform: skewX(-20deg); transition: 0.5s; }
    button:hover::after { left: 150%; }
    button:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px var(--primary-glow); }
    button:active { transform: translateY(2px) scale(0.98); }
    button.secondary { background: linear-gradient(45deg, #333, #555); }
    button.success { background: linear-gradient(45deg, #009933, var(--success)); color: black; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }
    input[type="text"] { background: rgba(0,0,0,0.5); border: 2px solid #444; color: white; padding: 15px; font-size: 1.5rem; border-radius: 8px; text-align: center; width: 100%; outline: none; transition: 0.3s; text-transform: uppercase; font-family: monospace; letter-spacing: 5px; margin-bottom: 20px; }
    input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }
    
    .stats-container { width: 100%; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .stat-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .stat-val { font-family: monospace; font-size: 1.4rem; color: var(--gold); }
    .color-picker { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
    .color-swatch { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; border: 3px solid #333; transition: 0.2s; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 15px currentColor; }
    
    .lobby-info { width: 100%; text-align: center; margin-bottom: 30px; }
    .lobby-code-box { background: rgba(0,0,0,0.5); border: 2px dashed var(--primary); padding: 20px; border-radius: 8px; margin: 15px 0; }
    .lobby-code { font-size: 3rem; font-family: monospace; color: var(--gold); letter-spacing: 10px; user-select: text; cursor: text; }
    .player-list { width: 100%; list-style: none; margin-bottom: 20px; max-height: 250px; overflow-y: auto; }
    .player-list li { background: rgba(255,255,255,0.05); margin-bottom: 8px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; transition: 0.3s; border-left: 5px solid transparent; }
    .player-list li.is-host { border-left-color: var(--gold); }
    
    #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; display: none; padding: 20px; }
    .hud-panel { background: rgba(10, 10, 15, 0.8); border: 2px solid var(--primary); border-radius: 12px; padding: 15px 25px; position: absolute; backdrop-filter: blur(5px); box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    #hud-top-left { top: 20px; left: 20px; border-color: var(--gold); }
    #hud-money { font-size: 2rem; color: var(--gold); font-family: monospace; font-weight: bold; }
    #hud-bottom-right { bottom: 20px; right: 20px; text-align: right; }
    #hud-speed { font-size: 2.5rem; font-family: monospace; font-weight: bold; color: white; font-style: italic; }
    #hud-speed span { font-size: 1rem; color: var(--text-dim); font-style: normal; }
    #hud-bottom-left { bottom: 20px; left: 20px; width: 100px; height: 100px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border-width: 4px; border-color: #00ffff; box-shadow: 0 0 20px rgba(0,255,255,0.3); }
    #hud-item { font-size: 3rem; text-shadow: 0 0 10px #00ffff; }
    #hud-top-right { top: 20px; right: 20px; border-color: #444; }
    #leaderboard { list-style: none; font-family: monospace; font-size: 1.2rem; }
    #leaderboard li { margin-bottom: 5px; display: flex; justify-content: space-between; gap: 20px; }
    
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: rgba(0,0,0,0.9); border-left: 5px solid var(--primary); color: white; padding: 15px 25px; border-radius: 4px; font-weight: bold; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideDown 0.3s forwards, fadeOut 0.3s forwards 2.7s; opacity: 0; transform: translateY(-20px); }
    .toast.success { border-left-color: var(--success); }
    .toast.warning { border-left-color: var(--gold); }
    @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-20px); } }
    
    #loading-screen { background: #05050a; z-index: 999; }
    .loader { border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; display: none; }
    .crosshair::before, .crosshair::after { content: ''; position: absolute; background: rgba(255,255,255,0.5); }
    .crosshair::before { top: 50%; left: -5px; right: -5px; height: 2px; transform: translateY(-50%); }
    .crosshair::after { left: 50%; top: -5px; bottom: -5px; width: 2px; transform: translateX(-50%); }
    
    #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.3) 100%); pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 4; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

<div id="game-canvas-container"><canvas id="game-canvas"></canvas></div>
<div id="damage-overlay"></div>
<div id="crosshair" class="crosshair"></div>

<div id="toast-container"></div>

<div id="ui-layer">
    <div id="screen-loading" class="screen active">
        <div class="loader"></div>
        <h2 id="loading-text">INITIALIZING ENGINE...</h2>
    </div>

    <div id="screen-main" class="screen">
        <h1>KART BROS 3D</h1>
        <div class="panel">
            <div class="btn-group">
                <button onclick="UI.nav('screen-garage')">Garage & Upgrades</button>
                <button onclick="Net.hostGame()">Host Game Lobby</button>
                <button onclick="UI.nav('screen-join')">Join Game Lobby</button>
                <button class="secondary" onclick="Settings.toggleAudio()">Toggle Audio</button>
            </div>
        </div>
    </div>

    <div id="screen-garage" class="screen">
        <h1>GARAGE</h1>
        <div class="panel">
            <div class="stats-container">
                <div class="stat-row">
                    <h3>Wallet Balance</h3>
                    <div class="stat-val">$<span id="garage-money">0</span></div>
                </div>
                <div class="stat-row">
                    <div>
                        <h3>Top Speed</h3>
                        <span style="color:var(--text-dim)">Level <span id="lvl-speed">1</span>/10</span>
                    </div>
                    <button class="success" style="padding: 10px 20px;" onclick="Garage.upgrade('speed')">Upgrade $<span id="cost-speed">100</span></button>
                </div>
                <div class="stat-row">
                    <div>
                        <h3>Acceleration</h3>
                        <span style="color:var(--text-dim)">Level <span id="lvl-accel">1</span>/10</span>
                    </div>
                    <button class="success" style="padding: 10px 20px;" onclick="Garage.upgrade('accel')">Upgrade $<span id="cost-accel">100</span></button>
                </div>
                <div class="stat-row">
                    <div>
                        <h3>Handling</h3>
                        <span style="color:var(--text-dim)">Level <span id="lvl-hand">1</span>/10</span>
                    </div>
                    <button class="success" style="padding: 10px 20px;" onclick="Garage.upgrade('hand')">Upgrade $<span id="cost-hand">100</span></button>
                </div>
            </div>
            
            <h3>Paint Job</h3>
            <div id="color-picker" class="color-picker"></div>

            <button class="secondary" style="margin-top:20px; width:100%" onclick="UI.nav('screen-main')">Back to Menu</button>
        </div>
    </div>

    <div id="screen-join" class="screen">
        <h1>JOIN LOBBY</h1>
        <div class="panel">
            <input type="text" id="join-code-input" placeholder="ENTER 5-LETTER CODE" maxlength="5" autocomplete="off">
            <div class="btn-group">
                <button onclick="Net.joinGame()">Connect to Host</button>
                <button class="secondary" onclick="UI.nav('screen-main')">Back</button>
            </div>
        </div>
    </div>

    <div id="screen-lobby" class="screen">
        <h1>GAME LOBBY</h1>
        <div class="panel" style="min-width: 600px;">
            <div class="lobby-info">
                <h3>ROOM CODE</h3>
                <div class="lobby-code-box">
                    <span id="lobby-code-display" class="lobby-code">.....</span>
                </div>
                <p style="color:var(--text-dim)">Share this code with up to 4 other players.</p>
            </div>
            
            <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3>Connected Players (<span id="player-count">1</span>/5)</h3>
            </div>
            
            <ul id="lobby-player-list" class="player-list">
                </ul>

            <div class="btn-group" style="margin-top: 20px;">
                <button id="btn-start-game" class="success" style="display:none; font-size:1.5rem;" onclick="Net.startGame()">START RACE</button>
                <button id="btn-waiting-host" class="secondary" disabled style="display:none;">Waiting for Host...</button>
                <button class="secondary" onclick="Net.disconnect()">Leave Lobby</button>
            </div>
        </div>
    </div>

    <div id="hud">
        <div id="hud-top-left" class="hud-panel">
            <div id="hud-money">$0</div>
        </div>
        <div id="hud-top-right" class="hud-panel">
            <ul id="leaderboard"></ul>
        </div>
        <div id="hud-bottom-left" class="hud-panel">
            <div id="hud-item">?</div>
        </div>
        <div id="hud-bottom-right" class="hud-panel">
            <div id="hud-speed">000 <span>KPH</span></div>
        </div>
    </div>
</div>

<script>
/**
 * UTILITIES
 */
const Utils = {
    generateID: () => Math.random().toString(36).substring(2, 7).toUpperCase(),
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    lerp: (start, end, amt) => (1 - amt) * start + amt * end,
    rand: (min, max) => Math.random() * (max - min) + min,
    distance2D: (x1, z1, x2, z2) => Math.sqrt((x2-x1)**2 + (z2-z1)**2)
};

const UI = {
    toast: (msg, type='info') => {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.innerText = msg;
        c.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    },
    nav: (screenId) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(screenId) document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-garage') Garage.updateUI();
    },
    updateLobby: () => {
        const list = document.getElementById('lobby-player-list');
        list.innerHTML = '';
        const players = Object.values(State.players);
        document.getElementById('player-count').innerText = players.length;
        
        players.forEach(p => {
            const li = document.createElement('li');
            li.style.borderLeftColor = p.color;
            if(p.isHost) li.classList.add('is-host');
            
            let html = `<div><span style="display:inline-block; width:15px; height:15px; border-radius:50%; background:${p.color}; margin-right:10px;"></span>`;
            html += `<strong>${p.id === State.localId ? 'You' : 'Player ' + p.id.substring(0,4)}</strong>`;
            if(p.isHost) html += ` <span style="color:var(--gold); font-size:0.8rem;">[HOST]</span>`;
            html += `</div><div>Spd:${p.stats.speed} Acc:${p.stats.accel}</div>`;
            li.innerHTML = html;
            list.appendChild(li);
        });

        if(State.isHost) {
            document.getElementById('btn-start-game').style.display = 'block';
            document.getElementById('btn-waiting-host').style.display = 'none';
        } else {
            document.getElementById('btn-start-game').style.display = 'none';
            document.getElementById('btn-waiting-host').style.display = 'block';
        }
    },
    updateHUD: () => {
        if(!State.inGame) return;
        document.getElementById('hud-money').innerText = `$${Save.data.money}`;
        if(Engine.localKart) {
            const speed = Math.abs(Math.round(Engine.localKart.velocity.length() * 60)); // pseudo KPH
            document.getElementById('hud-speed').innerHTML = `${speed.toString().padStart(3, '0')} <span>KPH</span>`;
            
            const item = Engine.localKart.item;
            const itemMap = { 0: '?', 1: '🚀', 2: '💣', 3: '⚡' };
            document.getElementById('hud-item').innerText = itemMap[item] || '✖';
        }

        // Leaderboard (sort by score/money for now)
        const lb = document.getElementById('leaderboard');
        lb.innerHTML = '';
        const sorted = Object.values(State.players).sort((a,b) => b.score - a.score);
        sorted.forEach((p, i) => {
            const li = document.createElement('li');
            li.style.color = p.id === State.localId ? var(--gold) : 'white';
            li.innerHTML = `<span>${i+1}. ${p.id.substring(0,4)}</span><span>${p.score}</span>`;
            lb.appendChild(li);
        });
    },
    damageEffect: () => {
        const overlay = document.getElementById('damage-overlay');
        overlay.style.opacity = '1';
        setTimeout(() => overlay.style.opacity = '0', 200);
    }
};

/**
 * SAVE DATA
 */
const Save = {
    data: { money: 500, speed: 1, accel: 1, hand: 1, color: '#ff3366' },
    colors: ['#ff3366', '#33ccff', '#33ff33', '#ffff33', '#ff9933', '#cc33ff', '#ffffff', '#222222'],
    load: () => {
        const d = localStorage.getItem('kartSave');
        if(d) Save.data = { ...Save.data, ...JSON.parse(d) };
    },
    save: () => localStorage.setItem('kartSave', JSON.stringify(Save.data)),
    addMoney: (amt) => { Save.data.money += amt; Save.save(); UI.updateHUD(); }
};
Save.load();

const Garage = {
    updateUI: () => {
        document.getElementById('garage-money').innerText = Save.data.money;
        ['speed', 'accel', 'hand'].forEach(stat => {
            const lvl = Save.data[stat];
            document.getElementById(`lvl-${stat}`).innerText = lvl;
            document.getElementById(`cost-${stat}`).innerText = lvl >= 10 ? 'MAX' : lvl * 150;
            document.querySelector(`button[onclick="Garage.upgrade('${stat}')"]`).disabled = lvl >= 10;
        });
        
        const cp = document.getElementById('color-picker');
        cp.innerHTML = '';
        Save.colors.forEach(c => {
            const d = document.createElement('div');
            d.className = `color-swatch ${Save.data.color === c ? 'active' : ''}`;
            d.style.backgroundColor = c;
            d.onclick = () => { Save.data.color = c; Save.save(); Garage.updateUI(); };
            cp.appendChild(d);
        });
    },
    upgrade: (stat) => {
        const cost = Save.data[stat] * 150;
        if(Save.data.money >= cost && Save.data[stat] < 10) {
            Save.data.money -= cost;
            Save.data[stat]++;
            Save.save();
            Garage.updateUI();
            UI.toast('Upgrade Successful!', 'success');
            AudioSys.play('upgrade');
        } else if (Save.data[stat] >= 10) {
            UI.toast('Max Level Reached!', 'warning');
        } else {
            UI.toast('Not enough money!', 'warning');
            AudioSys.play('error');
        }
    }
};

/**
 * AUDIO SYSTEM (Web Audio API Synthesizer)
 */
const AudioSys = {
    ctx: null, enabled: true,
    init: () => { if(!AudioSys.ctx) AudioSys.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play: (type) => {
        if(!AudioSys.enabled) return;
        AudioSys.init();
        const t = AudioSys.ctx.currentTime;
        const osc = AudioSys.ctx.createOscillator();
        const gain = AudioSys.ctx.createGain();
        osc.connect(gain); gain.connect(AudioSys.ctx.destination);
        
        if(type === 'coin') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(1200, t + 0.1);
            gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.3, t + 0.05); gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        } else if (type === 'upgrade') {
            osc.type = 'square'; osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(600, t+0.1); osc.frequency.setValueAtTime(800, t+0.2);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'error') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(100, t+0.2);
            gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
            osc.start(t); osc.stop(t + 0.2);
        } else if (type === 'shoot') {
            osc.type = 'square'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(50, t+0.2);
            gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.2);
            osc.start(t); osc.stop(t+0.2);
        } else if (type === 'hit') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, t);
            gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.3);
            osc.start(t); osc.stop(t+0.3);
        }
    }
};

const Settings = {
    toggleAudio: () => { AudioSys.enabled = !AudioSys.enabled; UI.toast(`Audio ${AudioSys.enabled ? 'ON' : 'OFF'}`); }
};

/**
 * GAME STATE & INPUT
 */
const State = {
    isHost: false, inGame: false, localId: null, players: {}, 
    maxPlayers: 5, tickRate: 20 // Server updates per sec
};

const Input = {
    up:0, down:0, left:0, right:0, action:0,
    bind: () => {
        window.addEventListener('keydown', e => Input.set(e.code, 1));
        window.addEventListener('keyup', e => Input.set(e.code, 0));
    },
    set: (code, val) => {
        if(code==='ArrowUp'||code==='KeyW') Input.up=val;
        if(code==='ArrowDown'||code==='KeyS') Input.down=val;
        if(code==='ArrowLeft'||code==='KeyA') Input.left=val;
        if(code==='ArrowRight'||code==='KeyD') Input.right=val;
        if(code==='Space') Input.action=val;
    },
    getState: () => ({u:Input.up, d:Input.down, l:Input.left, r:Input.right, a:Input.action})
};
Input.bind();

/**
 * NETWORKING (PEERJS)
 * Uses public STUN servers for robust NAT traversal.
 */
const Net = {
    peer: null, hostConn: null, clients: {},
    
    initPeer: () => {
        return new Promise((resolve, reject) => {
            const id = Utils.generateID();
            Net.peer = new Peer(id, {
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] },
                debug: 1
            });
            Net.peer.on('open', pid => { State.localId = pid; resolve(pid); });
            Net.peer.on('error', err => { UI.toast(`Net Error: ${err.type}`, 'warning'); console.error(err); reject(err); });
        });
    },

    hostGame: async () => {
        UI.nav('screen-loading');
        document.getElementById('loading-text').innerText = "CREATING LOBBY...";
        try {
            await Net.initPeer();
            State.isHost = true;
            State.players[State.localId] = { id: State.localId, isHost: true, stats: Save.data, color: Save.data.color, score: 0 };
            
            Net.peer.on('connection', conn => {
                if(Object.keys(State.players).length >= State.maxPlayers || State.inGame) {
                    conn.send({ type: 'reject', msg: 'Lobby full or game started' });
                    setTimeout(()=>conn.close(), 500); return;
                }
                
                conn.on('data', data => Net.handleClientMsg(conn.peer, data));
                conn.on('close', () => Net.removeClient(conn.peer));
                Net.clients[conn.peer] = conn;
            });
            
            document.getElementById('lobby-code-display').innerText = State.localId;
            UI.nav('screen-lobby');
            UI.updateLobby();
            UI.toast('Lobby Created!', 'success');
        } catch(e) { UI.nav('screen-main'); }
    },

    joinGame: async () => {
        const code = document.getElementById('join-code-input').value.toUpperCase();
        if(code.length !== 5) return UI.toast('Invalid Code length');
        UI.nav('screen-loading');
        document.getElementById('loading-text').innerText = "CONNECTING...";
        
        try {
            await Net.initPeer();
            State.isHost = false;
            Net.hostConn = Net.peer.connect(code, { reliable: true });
            
            Net.hostConn.on('open', () => {
                Net.hostConn.send({ type: 'join', data: { id: State.localId, stats: Save.data, color: Save.data.color, score: 0 } });
            });
            
            Net.hostConn.on('data', Net.handleHostMsg);
            Net.hostConn.on('close', Net.disconnect);
        } catch(e) { UI.nav('screen-main'); }
    },

    disconnect: () => {
        if(Net.peer) Net.peer.destroy();
        Net.peer = null; Net.hostConn = null; Net.clients = {}; State.players = {};
        if(State.inGame) Engine.stop();
        UI.nav('screen-main');
        UI.toast('Disconnected');
    },

    startGame: () => {
        if(!State.isHost) return;
        const seed = Math.random();
        Net.broadcast({ type: 'start', seed: seed });
        Engine.start(seed);
    },

    // Host handlers
    handleClientMsg: (pid, msg) => {
        if(msg.type === 'join') {
            State.players[pid] = msg.data;
            Net.broadcastLobby();
            UI.updateLobby();
        } else if (msg.type === 'input' && State.inGame && Engine.karts[pid]) {
            Engine.karts[pid].netInput = msg.data;
        }
    },
    removeClient: (pid) => {
        delete Net.clients[pid];
        delete State.players[pid];
        if(State.inGame && Engine.karts[pid]) {
            Engine.scene.remove(Engine.karts[pid].mesh);
            delete Engine.karts[pid];
        }
        Net.broadcastLobby();
        UI.updateLobby();
    },
    broadcast: (msg) => { Object.values(Net.clients).forEach(c => c.send(msg)); },
    broadcastLobby: () => Net.broadcast({ type: 'lobby_sync', players: State.players }),
    broadcastGame: () => {
        if(!State.inGame) return;
        const snap = { k: {}, p: Engine.items.getState(), w: Engine.weapons.getState(), s: {} };
        for(let id in Engine.karts) {
            const k = Engine.karts[id];
            snap.k[id] = { p: k.mesh.position.toArray(), r: k.mesh.rotation.toArray(), v: k.velocity.toArray() };
            snap.s[id] = State.players[id].score;
        }
        Net.broadcast({ type: 'game_sync', snap: snap });
    },

    // Client handlers
    handleHostMsg: (msg) => {
        if(msg.type === 'reject') { UI.toast(msg.msg, 'warning'); Net.disconnect(); }
        else if (msg.type === 'lobby_sync') { 
            State.players = msg.players; 
            document.getElementById('lobby-code-display').innerText = Net.hostConn.peer;
            UI.nav('screen-lobby'); UI.updateLobby(); 
        }
        else if (msg.type === 'start') { Engine.start(msg.seed); }
        else if (msg.type === 'game_sync') { Engine.applySnapshot(msg.snap); }
        else if (msg.type === 'event') { Engine.handleNetEvent(msg.evt); }
    },
    sendInput: () => {
        if(!State.isHost && Net.hostConn && State.inGame) {
            Net.hostConn.send({ type: 'input', data: Input.getState() });
        }
    }
};

/**
 * 3D ENGINE & PHYSICS
 */
class Kart {
    constructor(pid, data, isLocal, startPos) {
        this.pid = pid; this.isLocal = isLocal; this.data = data;
        this.velocity = new THREE.Vector3(); this.angularVel = 0;
        
        // Stats mapping
        const spdLvl = data.stats.speed; const accLvl = data.stats.accel; const handLvl = data.stats.hand;
        this.maxSpeed = 1.5 + (spdLvl * 0.1);
        this.accel = 0.05 + (accLvl * 0.005);
        this.turnSpeed = 0.04 + (handLvl * 0.003);
        this.friction = 0.96;
        
        this.item = 0; // 0: none, 1: missile, 2: mine, 3: boost
        this.cooldown = 0;
        this.hp = 100;
        this.invuln = 0;

        this.netInput = { u:0, d:0, l:0, r:0, a:0 };

        // Visuals
        this.mesh = new THREE.Group();
        this.mesh.position.copy(startPos);
        
        // Body
        const bodyGeo = new THREE.BoxGeometry(2, 0.8, 3.5);
        const bodyMat = new THREE.MeshPhongMaterial({color: data.color, shininess: 100});
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.6; body.castShadow = true;
        this.mesh.add(body);

        // Cockpit
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 1.5), new THREE.MeshPhongMaterial({color: 0x111111}));
        cockpit.position.set(0, 1.2, -0.2);
        this.mesh.add(cockpit);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16); wheelGeo.rotateZ(Math.PI/2);
        const wheelMat = new THREE.MeshPhongMaterial({color: 0x222222});
        const pos = [[1.2, 0.6, 1.2], [-1.2, 0.6, 1.2], [1.2, 0.6, -1.2], [-1.2, 0.6, -1.2]];
        this.wheels = pos.map(p => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.position.set(...p); w.castShadow = true;
            this.mesh.add(w); return w;
        });

        // Name tag
        const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d'); ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.textAlign = 'center'; ctx.fillText(pid.substring(0,5), 128, 40);
        const tex = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: tex });
        this.nameTag = new THREE.Sprite(spriteMat);
        this.nameTag.position.set(0, 3, 0); this.nameTag.scale.set(4, 1, 1);
        this.mesh.add(this.nameTag);

        Engine.scene.add(this.mesh);
    }

    update() {
        if(this.invuln > 0) this.invuln--;
        if(this.cooldown > 0) this.cooldown--;

        // Blinking if invuln
        this.mesh.visible = (this.invuln % 10 < 5);

        const inp = this.isLocal ? Input.getState() : this.netInput;
        
        // Action
        if(inp.a && this.cooldown <= 0 && this.item !== 0) {
            Engine.useItem(this);
            this.cooldown = 30;
        }

        // Turning
        const speedRatio = this.velocity.length() / this.maxSpeed;
        if(speedRatio > 0.1) {
            let turn = 0;
            if(inp.l) turn = this.turnSpeed;
            if(inp.r) turn = -this.turnSpeed;
            if(inp.d) turn *= -1; // reverse turn
            this.mesh.rotation.y += turn;
        }

        // Acceleration
        const dir = new THREE.Vector3(0,0,1).applyQuaternion(this.mesh.quaternion);
        let acc = 0;
        if(inp.u) acc = this.accel;
        if(inp.d) acc = -this.accel * 0.5;
        
        dir.multiplyScalar(acc);
        this.velocity.add(dir);
        this.velocity.multiplyScalar(this.friction);

        // Limits
        if(this.velocity.length() > this.maxSpeed && this.item !== 3) {
            this.velocity.normalize().multiplyScalar(this.maxSpeed);
        }

        // Apply velocity
        this.mesh.position.add(this.velocity);

        // Wheel animation
        this.wheels.forEach(w => w.rotation.x += this.velocity.length() * 0.2);

        // Very basic track boundaries (circle arena 150 radius)
        const dist = Math.sqrt(this.mesh.position.x**2 + this.mesh.position.z**2);
        if(dist > 140) {
            const normal = new THREE.Vector3(this.mesh.position.x, 0, this.mesh.position.z).normalize();
            this.mesh.position.copy(normal.multiplyScalar(140));
            this.velocity.reflect(normal).multiplyScalar(0.5); // bounce
        }

        // Items logic (Host only)
        if(State.isHost) {
            Engine.items.checkCollision(this);
            Engine.weapons.checkCollision(this);
        }
    }

    hit() {
        if(this.invuln > 0) return;
        this.velocity.multiplyScalar(0.1);
        this.velocity.y = 1.5; // pop up
        this.invuln = 60;
        this.item = 0;
        if(this.isLocal) { UI.damageEffect(); AudioSys.play('hit'); }
        // Drop money
        State.players[this.pid].score = Math.max(0, State.players[this.pid].score - 10);
    }
}

class ItemManager {
    constructor() {
        this.boxes = [];
        const geo = new THREE.BoxGeometry(2,2,2);
        const canvas = document.createElement('canvas'); canvas.width=128; canvas.height=128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle='#ff00ff'; ctx.fillRect(0,0,128,128); ctx.fillStyle='#00ffff'; ctx.font='80px Arial'; ctx.fillText('?',30,95);
        const mat = new THREE.MeshPhongMaterial({map: new THREE.CanvasTexture(canvas), emissive: 0x330033});
        
        if(State.isHost) {
            for(let i=0; i<15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const r = Utils.rand(20, 130);
                this.spawn(i, Math.cos(angle)*r, Math.sin(angle)*r, geo, mat);
            }
        }
    }
    spawn(id, x, z, geo, mat) {
        const m = new THREE.Mesh(geo, mat); m.position.set(x, 1.5, z); m.castShadow = true;
        Engine.scene.add(m);
        this.boxes.push({ id, mesh: m, active: true, timer: 0 });
    }
    update() {
        const t = Date.now() * 0.002;
        this.boxes.forEach(b => {
            if(b.active) { b.mesh.rotation.y += 0.02; b.mesh.rotation.x = Math.sin(t+b.id)*0.2; }
            else if(State.isHost) {
                b.timer--;
                if(b.timer <= 0) b.active = true;
            }
            b.mesh.visible = b.active;
        });
    }
    checkCollision(kart) {
        this.boxes.forEach(b => {
            if(b.active && kart.mesh.position.distanceTo(b.mesh.position) < 3.5) {
                b.active = false; b.timer = 300;
                const itemType = Math.floor(Utils.rand(1, 4)); // 1:missile, 2:mine, 3:boost
                kart.item = itemType;
                State.players[kart.pid].score += 5; // Reward for getting box
                
                // Event sync
                Net.broadcast({type:'event', evt:{action:'pickup', pid:kart.pid, item:itemType}});
                if(kart.isLocal) Engine.handleNetEvent({action:'pickup', pid:kart.pid, item:itemType});
            }
        });
    }
    getState() { return this.boxes.map(b => b.active); }
    setState(state) { state.forEach((active, i) => { if(this.boxes[i]) this.boxes[i].active = active; }); }
}

class WeaponManager {
    constructor() { this.weps = []; }
    spawnMissile(pos, dir, owner) {
        const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 2, 8), new THREE.MeshPhongMaterial({color:0xff0000}));
        mesh.rotation.x = Math.PI/2; mesh.position.copy(pos); mesh.position.y = 1;
        
        // Orient to direction
        const target = pos.clone().add(dir);
        mesh.lookAt(target);
        
        Engine.scene.add(mesh);
        this.weps.push({ type: 1, mesh, dir, owner, life: 150 });
        AudioSys.play('shoot');
    }
    spawnMine(pos, owner) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), new THREE.MeshPhongMaterial({color:0x222222}));
        mesh.position.copy(pos); mesh.position.y = 1;
        Engine.scene.add(mesh);
        this.weps.push({ type: 2, mesh, owner, life: 1000 });
    }
    update() {
        for(let i = this.weps.length - 1; i >= 0; i--) {
            const w = this.weps[i];
            w.life--;
            if(w.type === 1) { // Missile
                w.mesh.position.add(w.dir.clone().multiplyScalar(3.0)); // Fast speed
                Engine.particles.spawn(w.mesh.position, 0xffaa00, 1);
            }
            if(w.life <= 0) { Engine.scene.remove(w.mesh); this.weps.splice(i, 1); }
        }
    }
    checkCollision(kart) {
        for(let i = this.weps.length - 1; i >= 0; i--) {
            const w = this.weps[i];
            if(w.owner === kart.pid && w.type === 1 && w.life > 140) continue; // Don't hit self immediately with missile
            
            if(kart.mesh.position.distanceTo(w.mesh.position) < 3.5) {
                kart.hit();
                Engine.particles.spawnExplosion(w.mesh.position);
                Engine.scene.remove(w.mesh);
                this.weps.splice(i, 1);
                Net.broadcast({type:'event', evt:{action:'hit', pid:kart.pid, pos:w.mesh.position.toArray()}});
                if(kart.isLocal) Engine.handleNetEvent({action:'hit', pid:kart.pid, pos:w.mesh.position.toArray()});
            }
        }
    }
    getState() { return this.weps.map(w => ({ t:w.type, p:w.mesh.position.toArray(), d:w.dir?w.dir.toArray():null })); }
    setState(state) {
        // Simple client side recreation (visual only)
        this.weps.forEach(w => Engine.scene.remove(w.mesh));
        this.weps = [];
        state.forEach(w => {
            const pos = new THREE.Vector3().fromArray(w.p);
            if(w.t === 1) {
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,2,8), new THREE.MeshBasicMaterial({color:0xff0000}));
                mesh.position.copy(pos);
                if(w.d) { const dir = new THREE.Vector3().fromArray(w.d); mesh.lookAt(pos.clone().add(dir)); }
                mesh.rotation.x = Math.PI/2;
                Engine.scene.add(mesh); this.weps.push({mesh});
            } else if (w.t === 2) {
                const mesh = new THREE.Mesh(new THREE.SphereGeometry(1,8,8), new THREE.MeshBasicMaterial({color:0x222222}));
                mesh.position.copy(pos); Engine.scene.add(mesh); this.weps.push({mesh});
            }
        });
    }
}

class ParticleSystem {
    constructor() {
        this.parts = [];
        this.geo = new THREE.BoxGeometry(0.5,0.5,0.5);
    }
    spawn(pos, color, amt) {
        const mat = new THREE.MeshBasicMaterial({color});
        for(let i=0; i<amt; i++) {
            const m = new THREE.Mesh(this.geo, mat); m.position.copy(pos);
            const v = new THREE.Vector3(Utils.rand(-0.2,0.2), Utils.rand(0.1,0.5), Utils.rand(-0.2,0.2));
            Engine.scene.add(m); this.parts.push({m,v, life:20});
        }
    }
    spawnExplosion(pos) {
        AudioSys.play('hit');
        this.spawn(pos, 0xff5500, 20);
        this.spawn(pos, 0xffff00, 10);
    }
    update() {
        for(let i = this.parts.length - 1; i >= 0; i--) {
            const p = this.parts[i];
            p.m.position.add(p.v); p.m.scale.multiplyScalar(0.9); p.life--;
            if(p.life <= 0) { Engine.scene.remove(p.m); this.parts.splice(i,1); }
        }
    }
}

const Engine = {
    scene: null, camera: null, renderer: null,
    karts: {}, localKart: null,
    items: null, weapons: null, particles: null,
    animFrame: null, lastTick: 0,

    start: (seed) => {
        document.getElementById('ui-layer').style.pointerEvents = 'none';
        UI.nav(null); // Hide all screens
        document.getElementById('hud').style.display = 'block';
        document.getElementById('crosshair').style.display = 'block';
        State.inGame = true;

        Engine.scene = new THREE.Scene();
        Engine.scene.background = new THREE.Color(0x87CEEB);
        Engine.scene.fog = new THREE.FogExp2(0x87CEEB, 0.005);

        Engine.camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        Engine.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
        Engine.renderer.setSize(window.innerWidth, window.innerHeight);
        Engine.renderer.shadowMap.enabled = true;

        // Lighting
        const amb = new THREE.AmbientLight(0xffffff, 0.4); Engine.scene.add(amb);
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(100, 150, 50); dir.castShadow = true;
        dir.shadow.camera.left = -150; dir.shadow.camera.right = 150;
        dir.shadow.camera.top = 150; dir.shadow.camera.bottom = -150;
        Engine.scene.add(dir);

        // Environment (Procedural Arena)
        Math.seedrandom = seed; // pseudo seed
        const floorGeo = new THREE.CylinderGeometry(150, 150, 1, 64);
        
        // Procedural Checker Texture
        const fcvs = document.createElement('canvas'); fcvs.width=512; fcvs.height=512;
        const fctx = fcvs.getContext('2d');
        fctx.fillStyle='#2c3e50'; fctx.fillRect(0,0,512,512);
        fctx.fillStyle='#34495e';
        for(let i=0;i<8;i++) for(let j=0;j<8;j++) if((i+j)%2===0) fctx.fillRect(i*64,j*64,64,64);
        const ftex = new THREE.CanvasTexture(fcvs); ftex.wrapS = ftex.wrapT = THREE.RepeatWrapping; ftex.repeat.set(20,20);
        
        const floorMat = new THREE.MeshStandardMaterial({ map: ftex, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.5; floor.receiveShadow = true;
        Engine.scene.add(floor);

        // Walls
        const wallGeo = new THREE.TorusGeometry(150, 5, 16, 64);
        const wallMat = new THREE.MeshPhongMaterial({color: 0xff3366});
        const wall = new THREE.Mesh(wallGeo, wallMat); wall.rotation.x = Math.PI/2; wall.position.y = 2; wall.castShadow = true;
        Engine.scene.add(wall);

        // Obstacles
        for(let i=0; i<20; i++) {
            const o = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), new THREE.MeshPhongMaterial({color:0xaaaaaa}));
            const a = Utils.rand(0, Math.PI*2); const r = Utils.rand(20, 130);
            o.position.set(Math.cos(a)*r, 5, Math.sin(a)*r);
            o.castShadow = true; Engine.scene.add(o);
        }

        Engine.items = new ItemManager();
        Engine.weapons = new WeaponManager();
        Engine.particles = new ParticleSystem();

        // Spawn Players
        const players = Object.values(State.players);
        players.forEach((p, i) => {
            const angle = (i / players.length) * Math.PI * 2;
            const startPos = new THREE.Vector3(Math.cos(angle)*20, 0, Math.sin(angle)*20);
            const isLoc = p.id === State.localId;
            const k = new Kart(p.id, p, isLoc, startPos);
            Engine.karts[p.id] = k;
            if(isLoc) Engine.localKart = k;
        });

        window.addEventListener('resize', Engine.resize);
        Engine.loop();
    },

    useItem: (kart) => {
        const item = kart.item; kart.item = 0;
        const dir = new THREE.Vector3(0,0,1).applyQuaternion(kart.mesh.quaternion);
        
        if(State.isHost) {
            if(item === 1) Engine.weapons.spawnMissile(kart.mesh.position.clone().add(dir.clone().multiplyScalar(4)), dir, kart.pid);
            if(item === 2) Engine.weapons.spawnMine(kart.mesh.position.clone().sub(dir.clone().multiplyScalar(4)), kart.pid);
        }
        
        if(item === 3) {
            kart.velocity.add(dir.multiplyScalar(3.0)); // Boost
            AudioSys.play('shoot');
            if(kart.isLocal) Engine.particles.spawn(kart.mesh.position, 0x00ffff, 30);
        }

        if(kart.isLocal) UI.updateHUD();
        Net.broadcast({type:'event', evt:{action:'use', pid:kart.pid, item:item}});
    },

    handleNetEvent: (evt) => {
        if(evt.action === 'pickup') {
            if(Engine.karts[evt.pid]) {
                Engine.karts[evt.pid].item = evt.item;
                AudioSys.play('coin');
                if(evt.pid === State.localId) { Save.addMoney(10); UI.updateHUD(); }
            }
        }
        else if (evt.action === 'hit') {
            Engine.particles.spawnExplosion(new THREE.Vector3().fromArray(evt.pos));
            if(Engine.karts[evt.pid]) Engine.karts[evt.pid].hit();
        }
        else if (evt.action === 'use') {
            const k = Engine.karts[evt.pid];
            if(k && evt.item === 3) Engine.particles.spawn(k.mesh.position, 0x00ffff, 30);
        }
    },

    applySnapshot: (snap) => {
        for(let id in snap.k) {
            if(id === State.localId) continue; // Don't override local prediction
            const k = Engine.karts[id];
            if(k) {
                // Interpolation could go here, snapping for simple implementation
                k.mesh.position.fromArray(snap.k[id].p);
                k.mesh.rotation.fromArray(snap.k[id].r);
                k.velocity.fromArray(snap.k[id].v);
            }
        }
        for(let id in snap.s) { if(State.players[id]) State.players[id].score = snap.s[id]; }
        if(!State.isHost) {
            Engine.items.setState(snap.p);
            Engine.weapons.setState(snap.w);
        }
        UI.updateHUD();
    },

    loop: () => {
        if(!State.inGame) return;
        Engine.animFrame = requestAnimationFrame(Engine.loop);

        const now = Date.now();

        // Update entities
        Object.values(Engine.karts).forEach(k => k.update());
        Engine.items.update();
        Engine.weapons.update();
        Engine.particles.update();

        // Network tick
        if(now - Engine.lastTick > (1000 / State.tickRate)) {
            if(State.isHost) Engine.broadcastGame();
            else Net.sendInput();
            Engine.lastTick = now;
        }

        // Camera follow
        if(Engine.localKart) {
            const k = Engine.localKart.mesh;
            const offset = new THREE.Vector3(0, 5, -12).applyQuaternion(k.quaternion);
            const targetPos = k.position.clone().add(offset);
            Engine.camera.position.lerp(targetPos, 0.1);
            Engine.camera.lookAt(k.position.clone().add(new THREE.Vector3(0,2,0)));
            
            // Speed FOV effect
            const speed = Engine.localKart.velocity.length();
            Engine.camera.fov = Utils.lerp(Engine.camera.fov, 70 + speed * 10, 0.1);
            Engine.camera.updateProjectionMatrix();
        }

        Engine.renderer.render(Engine.scene, Engine.camera);
    },

    stop: () => {
        if(Engine.animFrame) cancelAnimationFrame(Engine.animFrame);
        State.inGame = false;
        document.getElementById('hud').style.display = 'none';
        document.getElementById('crosshair').style.display = 'none';
        document.getElementById('ui-layer').style.pointerEvents = 'auto';
        if(Engine.renderer) Engine.renderer.dispose();
        document.getElementById('game-canvas').remove();
        const c = document.createElement('canvas'); c.id = 'game-canvas';
        document.getElementById('game-canvas-container').appendChild(c);
    },

    resize: () => {
        if(!Engine.camera) return;
        Engine.camera.aspect = window.innerWidth / window.innerHeight;
        Engine.camera.updateProjectionMatrix();
        Engine.renderer.setSize(window.innerWidth, window.innerHeight);
    }
};

// Initial Setup
UI.nav('screen-main');
</script>
