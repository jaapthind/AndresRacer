<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kart Bros 3D - Arena Overhaul Edition</title>
<style>
    /* ==========================================================================
       ADVANCED STYLESHEET DEFINITIONS
       ========================================================================== */
    :root {
        --ui-primary: #00e5ff;
        --ui-secondary: #ff0055;
        --ui-bg-dark: rgba(5, 5, 10, 0.95);
        --ui-text-main: #ffffff;
        --ui-text-muted: #8899aa;
        --ui-accent: #ffdd00;
        --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        --font-mono: 'Courier New', Courier, monospace;
    }
    
    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        user-select: none; 
    }
    
    body, html { 
        width: 100vw; 
        height: 100vh; 
        overflow: hidden; 
        background-color: #000; 
        font-family: var(--font-main);
    }
    
    /* --------------------------------------------------------------------------
       RENDERER CONTAINERS
       -------------------------------------------------------------------------- */
    #engine-container { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        z-index: 1; 
    }
    
    canvas { 
        display: block; 
        width: 100%; 
        height: 100%; 
        image-rendering: optimizeSpeed;
    }

    /* --------------------------------------------------------------------------
       USER INTERFACE OVERLAYS
       -------------------------------------------------------------------------- */
    #interface-layer { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        z-index: 10; 
        display: flex; 
        flex-direction: column; 
        pointer-events: none; 
    }
    
    .ui-view { 
        display: none; 
        width: 100%; 
        height: 100%; 
        position: absolute; 
        top: 0; 
        left: 0; 
        align-items: center; 
        justify-content: center; 
        flex-direction: column; 
        background: radial-gradient(circle at center, #11111a 0%, #000000 100%); 
        pointer-events: auto; 
    }
    
    .ui-view.is-active { 
        display: flex; 
    }
    
    .ui-panel { 
        background: var(--ui-bg-dark); 
        border: 2px solid var(--ui-primary); 
        border-radius: 12px; 
        padding: 50px; 
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.2), inset 0 0 20px rgba(0, 229, 255, 0.1); 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-width: 500px; 
        backdrop-filter: blur(12px); 
    }
    
    /* --------------------------------------------------------------------------
       TYPOGRAPHY
       -------------------------------------------------------------------------- */
    h1 { 
        font-size: 5rem; 
        text-transform: uppercase; 
        font-weight: 900; 
        font-style: italic; 
        color: transparent; 
        -webkit-text-stroke: 3px var(--ui-primary); 
        text-shadow: 0 0 30px rgba(0, 229, 255, 0.6); 
        margin-bottom: 50px; 
        letter-spacing: 4px; 
    }
    
    h2 { font-size: 2.5rem; color: var(--ui-text-main); margin-bottom: 25px; }
    h3 { font-size: 1.8rem; color: var(--ui-text-muted); margin-bottom: 20px; }
    
    /* --------------------------------------------------------------------------
       CONTROLS & INPUTS
       -------------------------------------------------------------------------- */
    .button-stack { 
        display: flex; 
        flex-direction: column; 
        gap: 20px; 
        width: 100%; 
    }
    
    .action-btn { 
        background: linear-gradient(135deg, #0055ff, var(--ui-primary)); 
        color: white; 
        border: none; 
        padding: 20px 30px; 
        font-size: 1.4rem; 
        font-weight: 900; 
        border-radius: 6px; 
        cursor: pointer; 
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); 
        text-transform: uppercase; 
        letter-spacing: 2px; 
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4); 
        position: relative; 
        overflow: hidden; 
    }
    
    .action-btn::before { 
        content: ''; 
        position: absolute; 
        top: 0; 
        left: -100%; 
        width: 50%; 
        height: 100%; 
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent); 
        transform: skewX(-25deg); 
        transition: 0.5s; 
    }
    
    .action-btn:hover::before { left: 150%; }
    .action-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 25px rgba(0, 229, 255, 0.5); }
    .action-btn:active { transform: translateY(2px) scale(0.97); }
    
    .action-btn.variant-alt { background: linear-gradient(135deg, #333344, #555566); }
    .action-btn.variant-warn { background: linear-gradient(135deg, #aa0022, var(--ui-secondary)); }
    .action-btn.variant-success { background: linear-gradient(135deg, #00aa44, #00ff66); color: #000; }
    .action-btn:disabled { background: #222; color: #555; cursor: not-allowed; box-shadow: none; transform: none; }
    
    .text-input { 
        background: rgba(0,0,0,0.6); 
        border: 2px solid #334; 
        color: var(--ui-primary); 
        padding: 20px; 
        font-size: 2rem; 
        border-radius: 6px; 
        text-align: center; 
        width: 100%; 
        outline: none; 
        transition: 0.2s; 
        text-transform: uppercase; 
        font-family: var(--font-mono); 
        letter-spacing: 8px; 
        margin-bottom: 25px; 
    }
    
    .text-input:focus { border-color: var(--ui-primary); box-shadow: 0 0 20px rgba(0, 229, 255, 0.3); }

    /* --------------------------------------------------------------------------
       HUD ELEMENTS
       -------------------------------------------------------------------------- */
    #hud-layer { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        pointer-events: none; 
        z-index: 5; 
        display: none; 
        padding: 30px; 
    }
    
    .hud-widget { 
        background: rgba(10, 15, 20, 0.75); 
        border: 2px solid var(--ui-primary); 
        border-radius: 8px; 
        padding: 20px 30px; 
        position: absolute; 
        backdrop-filter: blur(8px); 
        box-shadow: 0 0 20px rgba(0,0,0,0.6); 
    }
    
    #widget-currency { top: 30px; left: 30px; border-color: var(--ui-accent); font-size: 2.5rem; color: var(--ui-accent); font-family: var(--font-mono); font-weight: bold; }
    #widget-telemetry { bottom: 30px; right: 30px; text-align: right; }
    #telemetry-speed { font-size: 3.5rem; font-family: var(--font-mono); font-weight: bold; color: #fff; font-style: italic; }
    #telemetry-speed span { font-size: 1.2rem; color: var(--ui-text-muted); font-style: normal; margin-left: 5px; }
    
    #widget-inventory { 
        bottom: 30px; 
        left: 30px; 
        width: 120px; 
        height: 120px; 
        border-radius: 50%; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        border-width: 4px; 
        border-color: #ff00ff; 
        box-shadow: 0 0 30px rgba(255, 0, 255, 0.4); 
    }
    
    #inventory-icon { font-size: 4rem; text-shadow: 0 0 15px #ff00ff; }
    #widget-standings { top: 30px; right: 30px; border-color: #445; min-width: 250px; }
    
    .standings-list { list-style: none; font-family: var(--font-mono); font-size: 1.4rem; }
    .standings-list li { margin-bottom: 8px; display: flex; justify-content: space-between; gap: 30px; }
    
    /* --------------------------------------------------------------------------
       SYSTEM NOTIFICATIONS
       -------------------------------------------------------------------------- */
    #notification-bus { 
        position: fixed; 
        top: 30px; 
        left: 50%; 
        transform: translateX(-50%); 
        z-index: 100; 
        pointer-events: none; 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
    }
    
    .sys-toast { 
        background: rgba(0,0,0,0.95); 
        border-left: 6px solid var(--ui-primary); 
        color: white; 
        padding: 18px 30px; 
        border-radius: 4px; 
        font-weight: bold; 
        font-size: 1.2rem; 
        box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
        animation: toastIn 0.3s forwards, toastOut 0.3s forwards 3.5s; 
        opacity: 0; 
        transform: translateY(-20px); 
    }
    
    .sys-toast.t-success { border-left-color: #00ff66; }
    .sys-toast.t-warn { border-left-color: var(--ui-accent); }
    .sys-toast.t-err { border-left-color: var(--ui-secondary); }
    
    @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-20px); } }
    
    /* --------------------------------------------------------------------------
       VISUAL EFFECTS OVERLAYS
       -------------------------------------------------------------------------- */
    #vfx-damage { 
        position: absolute; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: radial-gradient(circle, transparent 40%, rgba(255,0,0,0.4) 100%); 
        pointer-events: none; 
        opacity: 0; 
        transition: opacity 0.15s; 
        z-index: 4; 
    }

    .reticle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 30px;
        height: 30px;
        pointer-events: none;
        display: none;
        z-index: 6;
    }
    .reticle::before, .reticle::after { content: ''; position: absolute; background: rgba(0, 255, 255, 0.6); }
    .reticle::before { top: 14px; left: -10px; right: -10px; height: 2px; }
    .reticle::after { left: 14px; top: -10px; bottom: -10px; width: 2px; }

</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

<div id="engine-container"><canvas id="engine-canvas"></canvas></div>

<div id="vfx-damage"></div>
<div id="reticle-center" class="reticle"></div>

<div id="notification-bus"></div>

<div id="interface-layer">
    
    <div id="view-init" class="ui-view is-active">
        <h2 style="color: var(--ui-primary); font-family: var(--font-mono);">INITIALIZING ENGINE PIPELINE...</h2>
    </div>

    <div id="view-root" class="ui-view">
        <h1>KART BROS 3D</h1>
        <div class="ui-panel">
            <div class="button-stack">
                <button class="action-btn" onclick="InterfaceController.navigate('view-garage')">ACCESS GARAGE</button>
                <button class="action-btn" onclick="NetworkController.initializeHost()">HOST ARENA</button>
                <button class="action-btn" onclick="InterfaceController.navigate('view-connect')">JOIN ARENA</button>
            </div>
        </div>
    </div>

    <div id="view-garage" class="ui-view">
        <h1>GARAGE OPERATIONS</h1>
        <div class="ui-panel" style="min-width: 600px;">
            <div style="width: 100%; display: flex; justify-content: space-between; border-bottom: 2px solid #334; padding-bottom: 20px; margin-bottom: 20px;">
                <h3>AVAILABLE FUNDS</h3>
                <div style="font-family: var(--font-mono); font-size: 2rem; color: var(--ui-accent);">$<span id="garage-funds-disp">0</span></div>
            </div>
            
            <div style="width: 100%; display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;">
                    <div>
                        <h3 style="margin:0; color: #fff;">TOP SPEED MODULE</h3>
                        <span style="color: var(--ui-text-muted); font-family: var(--font-mono);">TIER <span id="tier-spd">1</span>/10</span>
                    </div>
                    <button class="action-btn variant-success" style="padding: 10px 20px; font-size: 1rem;" onclick="GarageController.processUpgrade('spd')">UPGRADE $<span id="cost-spd">150</span></button>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;">
                    <div>
                        <h3 style="margin:0; color: #fff;">ACCELERATION DRIVE</h3>
                        <span style="color: var(--ui-text-muted); font-family: var(--font-mono);">TIER <span id="tier-acc">1</span>/10</span>
                    </div>
                    <button class="action-btn variant-success" style="padding: 10px 20px; font-size: 1rem;" onclick="GarageController.processUpgrade('acc')">UPGRADE $<span id="cost-acc">150</span></button>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px;">
                    <div>
                        <h3 style="margin:0; color: #fff;">HANDLING CHASSIS</h3>
                        <span style="color: var(--ui-text-muted); font-family: var(--font-mono);">TIER <span id="tier-hnd">1</span>/10</span>
                    </div>
                    <button class="action-btn variant-success" style="padding: 10px 20px; font-size: 1rem;" onclick="GarageController.processUpgrade('hnd')">UPGRADE $<span id="cost-hnd">150</span></button>
                </div>
            </div>

            <div style="margin-top: 30px; width: 100%; text-align: center;">
                <h3 style="margin-bottom: 15px;">CHASSIS PIGMENT</h3>
                <div id="pigment-selector" style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;"></div>
            </div>

            <button class="action-btn variant-alt" style="margin-top:40px; width:100%" onclick="InterfaceController.navigate('view-root')">RETURN TO ROOT</button>
        </div>
    </div>

    <div id="view-connect" class="ui-view">
        <h1>UPLINK ESTABLISHMENT</h1>
        <div class="ui-panel">
            <input type="text" id="uplink-code" class="text-input" placeholder="ENTER 6-CHAR HASH" maxlength="6" autocomplete="off">
            <div class="button-stack">
                <button class="action-btn" onclick="NetworkController.initializeClient()">INITIALIZE UPLINK</button>
                <button class="action-btn variant-alt" onclick="InterfaceController.navigate('view-root')">ABORT</button>
            </div>
        </div>
    </div>

    <div id="view-staging" class="ui-view">
        <h1>ARENA STAGING</h1>
        <div class="ui-panel" style="min-width: 700px;">
            <div style="text-align: center; margin-bottom: 40px; width: 100%;">
                <h3 style="letter-spacing: 4px;">UPLINK HASH</h3>
                <div style="background: rgba(0,0,0,0.6); border: 2px dashed var(--ui-primary); padding: 20px; border-radius: 8px; margin-top: 10px;">
                    <span id="hash-display" style="font-size: 4rem; font-family: var(--font-mono); color: var(--ui-accent); letter-spacing: 15px;">-----</span>
                </div>
            </div>
            
            <div style="width: 100%; display: flex; justify-content: space-between; border-bottom: 1px solid #445; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin:0;">CONNECTED ENTITIES</h3>
                <h3 style="margin:0; font-family: var(--font-mono);"><span id="entity-count">1</span>/8</h3>
            </div>
            
            <ul id="entity-list" style="width: 100%; list-style: none; max-height: 300px; overflow-y: auto; margin-bottom: 30px;">
                </ul>

            <div class="button-stack">
                <button id="cmd-deploy" class="action-btn variant-success" style="display:none; font-size: 1.8rem;" onclick="EngineCore.deployArena()">DEPLOY ARENA</button>
                <button id="cmd-standby" class="action-btn variant-alt" disabled style="display:none;">AWAITING HOST DEPLOYMENT...</button>
                <button class="action-btn variant-warn" onclick="NetworkController.terminateUplink()">TERMINATE UPLINK</button>
            </div>
        </div>
    </div>

    <div id="hud-layer">
        <div id="widget-currency" class="hud-widget">$0</div>
        
        <div id="widget-standings" class="hud-widget">
            <ul id="telemetry-standings" class="standings-list"></ul>
        </div>
        
        <div id="widget-inventory" class="hud-widget">
            <div id="inventory-icon">?</div>
        </div>
        
        <div id="widget-telemetry" class="hud-widget">
            <div id="telemetry-speed">000<span>KM/H</span></div>
        </div>
    </div>
</div>

<script>
/* ==========================================================================
   CORE UTILITY LIBRARY
   ========================================================================== */
const MathUtils = {
    generateHash: (len = 5) => {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let result = '';
        for(let i = 0; i < len; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        return result;
    },
    clamp: (val, min, max) => Math.min(Math.max(val, min), max),
    lerp: (start, end, factor) => (1 - factor) * start + factor * end,
    randomRange: (min, max) => Math.random() * (max - min) + min,
    distance2D: (x1, z1, x2, z2) => Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(z2 - z1, 2)),
    easeOutQuad: (x) => 1 - (1 - x) * (1 - x)
};

/* ==========================================================================
   STATE ARCHITECTURE & DATA PERSISTENCE
   ========================================================================== */
const AppState = {
    networkRole: 'NONE', // 'HOST', 'CLIENT', 'NONE'
    engineStatus: 'IDLE', // 'IDLE', 'STAGING', 'ACTIVE'
    localIdentifier: null,
    hostIdentifier: null,
    maximumEntities: 8,
    tickRateHz: 30, // Physics and Net interpolation rate
    entityRegistry: {} // Stores player data, stats, scores
};

const DataStore = {
    profile: {
        funds: 2500,
        stats: { spd: 1, acc: 1, hnd: 1 },
        pigment: '#00e5ff'
    },
    palette: ['#00e5ff', '#ff0055', '#ffdd00', '#00ff66', '#bd00ff', '#ffffff', '#111111', '#ff5500'],
    
    initialize: () => {
        const stored = localStorage.getItem('kb_profile_v2');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                DataStore.profile = { ...DataStore.profile, ...parsed };
            } catch (e) { console.warn("Profile data corruption detected. Using defaults."); }
        }
        DataStore.commit();
    },
    
    commit: () => {
        localStorage.setItem('kb_profile_v2', JSON.stringify(DataStore.profile));
    },
    
    transactFunds: (amount) => {
        DataStore.profile.funds += amount;
        DataStore.commit();
        InterfaceController.updateHUD();
    }
};

/* ==========================================================================
   USER INTERFACE CONTROLLER
   ========================================================================== */
const InterfaceController = {
    activeView: 'view-init',
    
    pushNotification: (message, severity = 'info') => {
        const bus = document.getElementById('notification-bus');
        const toast = document.createElement('div');
        let sevClass = '';
        if (severity === 'success') sevClass = 't-success';
        if (severity === 'warn') sevClass = 't-warn';
        if (severity === 'error') sevClass = 't-err';
        
        toast.className = `sys-toast ${sevClass}`;
        toast.innerText = message;
        bus.appendChild(toast);
        setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
    },
    
    navigate: (viewId) => {
        document.querySelectorAll('.ui-view').forEach(v => v.classList.remove('is-active'));
        if (viewId) {
            document.getElementById(viewId).classList.add('is-active');
            InterfaceController.activeView = viewId;
        } else {
            InterfaceController.activeView = null;
        }
        if (viewId === 'view-garage') GarageController.renderView();
    },
    
    refreshStagingArea: () => {
        const list = document.getElementById('entity-list');
        list.innerHTML = '';
        
        const entities = Object.values(AppState.entityRegistry);
        document.getElementById('entity-count').innerText = entities.length;
        
        entities.forEach(ent => {
            const node = document.createElement('li');
            node.style.padding = '15px';
            node.style.marginBottom = '10px';
            node.style.background = 'rgba(255,255,255,0.05)';
            node.style.borderRadius = '6px';
            node.style.display = 'flex';
            node.style.justifyContent = 'space-between';
            node.style.alignItems = 'center';
            node.style.borderLeft = `6px solid ${ent.pigment}`;
            
            const isLocal = ent.id === AppState.localIdentifier;
            const roleBadge = ent.role === 'HOST' ? '<span style="color:var(--ui-accent); font-size:0.8rem; margin-left:10px;">[HOST_NODE]</span>' : '';
            
            node.innerHTML = `
                <div style="display:flex; align-items:center;">
                    <div style="width:20px; height:20px; border-radius:50%; background:${ent.pigment}; margin-right:15px; box-shadow: 0 0 10px ${ent.pigment};"></div>
                    <strong style="font-family:var(--font-mono); font-size:1.2rem;">${isLocal ? 'LOCAL_ENTITY' : 'NODE_' + ent.id.substring(0,5)}</strong>
                    ${roleBadge}
                </div>
                <div style="color:var(--ui-text-muted); font-family:var(--font-mono);">
                    S:${ent.stats.spd} A:${ent.stats.acc} H:${ent.stats.hnd}
                </div>
            `;
            list.appendChild(node);
        });

        if (AppState.networkRole === 'HOST') {
            document.getElementById('cmd-deploy').style.display = 'block';
            document.getElementById('cmd-standby').style.display = 'none';
        } else {
            document.getElementById('cmd-deploy').style.display = 'none';
            document.getElementById('cmd-standby').style.display = 'block';
        }
    },
    
    updateHUD: () => {
        if (AppState.engineStatus !== 'ACTIVE') return;
        
        document.getElementById('widget-currency').innerText = `$${DataStore.profile.funds}`;
        
        if (EnvironmentCore.localController) {
            const kart = EnvironmentCore.localController;
            const velocityKmh = Math.abs(Math.round(kart.physicsData.velocity.length() * 45));
            document.getElementById('telemetry-speed').innerHTML = `${velocityKmh.toString().padStart(3, '0')}<span>KM/H</span>`;
            
            const itemMap = { 0: '?', 1: '🚀', 2: '💣', 3: '⚡' };
            document.getElementById('inventory-icon').innerText = itemMap[kart.state.activeItem] || '✖';
        }

        const standingsDOM = document.getElementById('telemetry-standings');
        standingsDOM.innerHTML = '';
        const sortedEntities = Object.values(AppState.entityRegistry).sort((a,b) => b.score - a.score);
        
        sortedEntities.forEach((ent, idx) => {
            const li = document.createElement('li');
            li.style.color = ent.id === AppState.localIdentifier ? 'var(--ui-accent)' : '#fff';
            li.innerHTML = `
                <span>${idx + 1}. ${ent.id.substring(0,5)}</span>
                <span>${ent.score} PTS</span>
            `;
            standingsDOM.appendChild(li);
        });
    },
    
    triggerVisualDamage: () => {
        const overlay = document.getElementById('vfx-damage');
        overlay.style.opacity = '1';
        setTimeout(() => { overlay.style.opacity = '0'; }, 250);
    }
};

/* ==========================================================================
   GARAGE & UPGRADE LOGIC
   ========================================================================== */
const GarageController = {
    costMultiplier: 250,
    
    renderView: () => {
        document.getElementById('garage-funds-disp').innerText = DataStore.profile.funds;
        
        ['spd', 'acc', 'hnd'].forEach(statKey => {
            const currentTier = DataStore.profile.stats[statKey];
            document.getElementById(`tier-${statKey}`).innerText = currentTier;
            
            const costDisp = document.getElementById(`cost-${statKey}`);
            const btn = costDisp.parentElement;
            
            if (currentTier >= 10) {
                costDisp.innerText = 'MAX';
                btn.disabled = true;
                btn.classList.remove('variant-success');
                btn.classList.add('variant-alt');
            } else {
                costDisp.innerText = currentTier * GarageController.costMultiplier;
                btn.disabled = false;
                btn.classList.add('variant-success');
                btn.classList.remove('variant-alt');
            }
        });
        
        const paletteContainer = document.getElementById('pigment-selector');
        paletteContainer.innerHTML = '';
        DataStore.palette.forEach(colorHex => {
            const swatch = document.createElement('div');
            swatch.style.width = '50px';
            swatch.style.height = '50px';
            swatch.style.borderRadius = '50%';
            swatch.style.backgroundColor = colorHex;
            swatch.style.cursor = 'pointer';
            swatch.style.border = '3px solid #334';
            swatch.style.transition = 'all 0.2s';
            
            if (DataStore.profile.pigment === colorHex) {
                swatch.style.borderColor = '#fff';
                swatch.style.transform = 'scale(1.15)';
                swatch.style.boxShadow = `0 0 20px ${colorHex}`;
            }
            
            swatch.onclick = () => {
                DataStore.profile.pigment = colorHex;
                DataStore.commit();
                GarageController.renderView();
            };
            
            paletteContainer.appendChild(swatch);
        });
    },
    
    processUpgrade: (statKey) => {
        const currentTier = DataStore.profile.stats[statKey];
        if (currentTier >= 10) return;
        
        const cost = currentTier * GarageController.costMultiplier;
        if (DataStore.profile.funds >= cost) {
            DataStore.profile.funds -= cost;
            DataStore.profile.stats[statKey]++;
            DataStore.commit();
            GarageController.renderView();
            InterfaceController.pushNotification(`SYSTEM UPGRADE: ${statKey.toUpperCase()} OPTIMIZED`, 'success');
        } else {
            InterfaceController.pushNotification('INSUFFICIENT FUNDS FOR UPGRADE', 'error');
        }
    }
};

const InputManager = {
    state: { accelerate: 0, brake: 0, steerLeft: 0, steerRight: 0, deployItem: 0 },
    
    initialize: () => {
        window.addEventListener('keydown', InputManager.handleKey(1));
        window.addEventListener('keyup', InputManager.handleKey(0));
    },
    
    handleKey: (val) => (e) => {
        if (AppState.engineStatus !== 'ACTIVE') return;
        switch(e.code) {
            case 'KeyW': case 'ArrowUp': InputManager.state.accelerate = val; break;
            case 'KeyS': case 'ArrowDown': InputManager.state.brake = val; break;
            case 'KeyA': case 'ArrowLeft': InputManager.state.steerLeft = val; break;
            case 'KeyD': case 'ArrowRight': InputManager.state.steerRight = val; break;
            case 'Space': InputManager.state.deployItem = val; break;
        }
    },
    
    serialize: () => ({
        w: InputManager.state.accelerate,
        s: InputManager.state.brake,
        a: InputManager.state.steerLeft,
        d: InputManager.state.steerRight,
        sp: InputManager.state.deployItem
    })
};

/* ==========================================================================
   NETWORK TRANSPORT LAYER (PEERJS WEBRTC)
   ========================================================================== */
const NetworkController = {
    peerInstance: null,
    hostConnection: null,
    clientConnections: {}, // Used by HOST to track CLIENTS
    
    establishPeer: () => {
        return new Promise((resolve, reject) => {
            const uuid = MathUtils.generateHash(6);
            NetworkController.peerInstance = new Peer(uuid, {
                config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:global.stun.twilio.com:3478' }] }
            });
            
            NetworkController.peerInstance.on('open', id => {
                AppState.localIdentifier = id;
                resolve(id);
            });
            
            NetworkController.peerInstance.on('error', err => {
                InterfaceController.pushNotification(`TRANSPORT ERROR: ${err.type}`, 'error');
                reject(err);
            });
        });
    },
    
    initializeHost: async () => {
        InterfaceController.pushNotification('ALLOCATING HOST RESOURCES...', 'info');
        try {
            await NetworkController.establishPeer();
            AppState.networkRole = 'HOST';
            AppState.engineStatus = 'STAGING';
            
            AppState.entityRegistry[AppState.localIdentifier] = {
                id: AppState.localIdentifier,
                role: 'HOST',
                stats: DataStore.profile.stats,
                pigment: DataStore.profile.pigment,
                score: 0
            };
            
            NetworkController.peerInstance.on('connection', conn => {
                if(Object.keys(AppState.entityRegistry).length >= AppState.maximumEntities || AppState.engineStatus === 'ACTIVE') {
                    conn.send({ op: 'REJECT', reason: 'CAPACITY EXCEEDED OR ARENA ACTIVE' });
                    setTimeout(() => conn.close(), 1000);
                    return;
                }
                
                NetworkController.clientConnections[conn.peer] = conn;
                
                conn.on('data', payload => NetworkController.processClientPayload(conn.peer, payload));
                conn.on('close', () => NetworkController.purgeClient(conn.peer));
            });
            
            document.getElementById('hash-display').innerText = AppState.localIdentifier;
            InterfaceController.navigate('view-staging');
            InterfaceController.refreshStagingArea();
            InterfaceController.pushNotification('HOST UPLINK ESTABLISHED', 'success');
            
        } catch (e) {
            InterfaceController.navigate('view-root');
        }
    },
    
    initializeClient: async () => {
        const targetHash = document.getElementById('uplink-code').value.toUpperCase();
        if (targetHash.length !== 6) return InterfaceController.pushNotification('INVALID HASH LENGTH', 'warn');
        
        InterfaceController.pushNotification('ATTEMPTING UPLINK...', 'info');
        
        try {
            await NetworkController.establishPeer();
            AppState.networkRole = 'CLIENT';
            
            NetworkController.hostConnection = NetworkController.peerInstance.connect(targetHash, { reliable: true });
            
            NetworkController.hostConnection.on('open', () => {
                AppState.engineStatus = 'STAGING';
                NetworkController.hostConnection.send({
                    op: 'JOIN_REQUEST',
                    payload: {
                        id: AppState.localIdentifier,
                        role: 'CLIENT',
                        stats: DataStore.profile.stats,
                        pigment: DataStore.profile.pigment,
                        score: 0
                    }
                });
            });
            
            NetworkController.hostConnection.on('data', NetworkController.processHostPayload);
            NetworkController.hostConnection.on('close', NetworkController.terminateUplink);
            
        } catch (e) {
            InterfaceController.navigate('view-root');
        }
    },
    
    terminateUplink: () => {
        if (NetworkController.peerInstance) NetworkController.peerInstance.destroy();
        NetworkController.peerInstance = null;
        NetworkController.hostConnection = null;
        NetworkController.clientConnections = {};
        
        AppState.entityRegistry = {};
        AppState.networkRole = 'NONE';
        
        if (AppState.engineStatus === 'ACTIVE') {
            EngineCore.terminateArena();
        }
        
        AppState.engineStatus = 'IDLE';
        InterfaceController.navigate('view-root');
        InterfaceController.pushNotification('UPLINK SEVERED', 'warn');
    },

    transmitAll: (payload) => {
        Object.values(NetworkController.clientConnections).forEach(conn => {
            if (conn.open) conn.send(payload);
        });
    },
    
    transmitInput: () => {
        if (AppState.networkRole === 'CLIENT' && NetworkController.hostConnection && NetworkController.hostConnection.open) {
            NetworkController.hostConnection.send({
                op: 'CLIENT_INPUT',
                payload: InputManager.serialize()
            });
        }
    },

    synchronizeStaging: () => {
        NetworkController.transmitAll({
            op: 'SYNC_STAGING',
            payload: AppState.entityRegistry
        });
    },
    
    synchronizeArenaState: () => {
        if (AppState.engineStatus !== 'ACTIVE' || AppState.networkRole !== 'HOST') return;
        
        const snapshot = {
            kinematics: {},
            entities: {},
            environment: {
                pickups: EnvironmentCore.itemSubsystem.getStates(),
                hazards: EnvironmentCore.hazardSubsystem.getStates()
            }
        };
        
        for (let uid in EnvironmentCore.actors) {
            const actor = EnvironmentCore.actors[uid];
            snapshot.kinematics[uid] = {
                p: actor.meshGroup.position.toArray(),
                q: actor.meshGroup.quaternion.toArray(),
                v: actor.physicsData.velocity.toArray(),
                a: actor.physicsData.angularVelocity
            };
            snapshot.entities[uid] = AppState.entityRegistry[uid].score;
        }
        
        NetworkController.transmitAll({ op: 'SYNC_ARENA', payload: snapshot });
    },

    processClientPayload: (clientUuid, message) => {
        switch (message.op) {
            case 'JOIN_REQUEST':
                AppState.entityRegistry[clientUuid] = message.payload;
                NetworkController.synchronizeStaging();
                InterfaceController.refreshStagingArea();
                break;
            case 'CLIENT_INPUT':
                if (AppState.engineStatus === 'ACTIVE' && EnvironmentCore.actors[clientUuid]) {
                    EnvironmentCore.actors[clientUuid].applyNetworkInput(message.payload);
                }
                break;
        }
    },
    
    processHostPayload: (message) => {
        switch (message.op) {
            case 'REJECT':
                InterfaceController.pushNotification(`UPLINK DENIED: ${message.reason}`, 'error');
                NetworkController.terminateUplink();
                break;
            case 'SYNC_STAGING':
                AppState.entityRegistry = message.payload;
                document.getElementById('hash-display').innerText = NetworkController.hostConnection.peer;
                InterfaceController.navigate('view-staging');
                InterfaceController.refreshStagingArea();
                break;
            case 'DEPLOY_CMD':
                EngineCore.initializeGraphics(message.payload.seed);
                break;
            case 'SYNC_ARENA':
                EngineCore.applyInterpolationSnapshot(message.payload);
                break;
            case 'ARENA_EVENT':
                EngineCore.processNetworkEvent(message.payload);
                break;
        }
    },
    
    purgeClient: (clientUuid) => {
        delete NetworkController.clientConnections[clientUuid];
        delete AppState.entityRegistry[clientUuid];
        
        if (AppState.engineStatus === 'ACTIVE' && EnvironmentCore.actors[clientUuid]) {
            EnvironmentCore.sceneGraph.remove(EnvironmentCore.actors[clientUuid].meshGroup);
            delete EnvironmentCore.actors[clientUuid];
        }
        
        NetworkController.synchronizeStaging();
        InterfaceController.refreshStagingArea();
    }
};

/**
 * Procedural Environment Subsystem - Generates "Smash Island" topography
 */
class TerrainGenerator {
    constructor(scene, rngSeed) {
        this.scene = scene;
        this.simplex = new SimplexNoise(rngSeed.toString());
        this.islandRadius = 350;
        this.collisionMeshes = [];
        this.buildTopography();
        this.buildOcean();
        this.buildSkyDome();
        this.buildFlora();
        this.buildInfrastructure();
    }

    buildTopography() {
        // High fidelity geometry for detailed terrain deformation
        const geoSegments = 64;
        const terrainGeo = new THREE.PlaneGeometry(this.islandRadius * 2.5, this.islandRadius * 2.5, geoSegments, geoSegments);
        terrainGeo.rotateX(-Math.PI / 2);

        const positions = terrainGeo.attributes.position.array;
        const uvs = terrainGeo.attributes.uv.array;
        
        // Multi-layered texturing via vertex colors
        const colors = [];
        const colorAttr = new THREE.BufferAttribute(new Float32Array(positions.length), 3);

        const colSand = new THREE.Color(0xe8d59b);
        const colGrass = new THREE.Color(0x4ca64c);
        const colRock = new THREE.Color(0x666666);
        const colDirt = new THREE.Color(0x8b5a2b);

        // Procedural heightmap generation using fractal noise
        for (let i = 0; i < positions.length; i += 3) {
            const vx = positions[i];
            const vz = positions[i + 2];
            const distFromCenter = Math.sqrt(vx * vx + vz * vz);
            
            // Base island shape (radial gradient falloff)
            let falloff = Math.max(0, 1 - Math.pow(distFromCenter / this.islandRadius, 2));
            
            // Fractal noise for organic variation
            let elevation = this.simplex.noise2D(vx * 0.005, vz * 0.005) * 20;
            elevation += this.simplex.noise2D(vx * 0.02, vz * 0.02) * 5;
            
            // Create terraced grassy plateaus (Smash Island aesthetic)
            let finalY = (elevation + 10) * falloff;
            if (finalY > 15 && finalY < 25) finalY = 20; // Plateau 1
            if (finalY > 35) finalY = 40; // Plateau 2
            
            // Coastal drop off
            if (distFromCenter > this.islandRadius * 0.85) {
                finalY -= Math.pow((distFromCenter - this.islandRadius * 0.85) * 0.5, 2);
            }

            // Track shaping (carving paths through the terrain)
            // Procedural curving track path
            const trackDist1 = Math.abs(Math.sin(vx * 0.01) * 50 + vz);
            const trackDist2 = Math.abs(Math.cos(vz * 0.01) * 50 + vx);
            const trackDist = Math.min(trackDist1, trackDist2);
            
            let isTrack = false;
            if (trackDist < 30 && distFromCenter < this.islandRadius * 0.8) {
                finalY = MathUtils.lerp(finalY, 5, 0.8); // Flatten track area
                isTrack = true;
            }

            positions[i + 1] = finalY;

            // Vertex coloring logic based on elevation and track data
            const vColor = new THREE.Color();
            if (finalY < 2) {
                vColor.copy(colSand);
            } else if (isTrack) {
                vColor.copy(colDirt);
            } else if (finalY > 30) {
                vColor.copy(colRock);
            } else {
                vColor.copy(colGrass);
                // Mix variation into grass
                const noiseC = this.simplex.noise2D(vx * 0.1, vz * 0.1);
                vColor.offsetHSL(0, 0, noiseC * 0.05);
            }
            
            colors.push(vColor.r, vColor.g, vColor.b);
        }

        terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        terrainGeo.computeVertexNormals();

        // Custom Shader Material for advanced terrain blending
               const terrainMat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.9,
            metalness: 0.0,
            flatShading: false // Set to false for better performance
        });

        this.terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        this.terrainMesh.receiveShadow = true;
        this.scene.add(this.terrainMesh);
        this.collisionMeshes.push(this.terrainMesh);
        
        // Central Lava Pit
        const lavaGeo = new THREE.PlaneGeometry(80, 80, 32, 32);
        lavaGeo.rotateX(-Math.PI/2);
        const lavaMat = new THREE.MeshBasicMaterial({color: 0xff3300});
        this.lavaMesh = new THREE.Mesh(lavaGeo, lavaMat);
        this.lavaMesh.position.set(0, 4, 0); // Sunken in center
        this.scene.add(this.lavaMesh);
    }

    buildOcean() {
        // High fidelity custom water shader program
        const waterGeo = new THREE.PlaneGeometry(2000, 2000, 128, 128);
        waterGeo.rotateX(-Math.PI / 2);

        this.waterUniforms = {
            uTime: { value: 0.0 },
            uBaseColor: { value: new THREE.Color(0x0088ff) },
            uCrestColor: { value: new THREE.Color(0x00ffff) }
        };

        const waterVert = `
            uniform float uTime;
            varying vec2 vUv;
            varying float vElevation;
            
            void main() {
                vUv = uv;
                vec4 modelPosition = modelMatrix * vec4(position, 1.0);
                
                // Complex wave displacement
                float elevation = sin(modelPosition.x * 0.02 + uTime) * cos(modelPosition.z * 0.02 + uTime) * 2.0;
                elevation += sin(modelPosition.x * 0.05 - uTime * 1.5) * 0.5;
                
                modelPosition.y += elevation;
                vElevation = elevation;
                
                gl_Position = projectionMatrix * viewMatrix * modelPosition;
            }
        `;

        const waterFrag = `
            uniform vec3 uBaseColor;
            uniform vec3 uCrestColor;
            varying float vElevation;
            
            void main() {
                float mixStrength = (vElevation + 2.5) / 5.0;
                vec3 finalColor = mix(uBaseColor, uCrestColor, mixStrength);
                gl_FragColor = vec4(finalColor, 0.85); // Semi-transparent
            }
        `;

        const waterMat = new THREE.ShaderMaterial({
            vertexShader: waterVert,
            fragmentShader: waterFrag,
            uniforms: this.waterUniforms,
            transparent: true,
            side: THREE.DoubleSide
        });

        this.waterMesh = new THREE.Mesh(waterGeo, waterMat);
        this.waterMesh.position.y = 0; // Sea level
        this.scene.add(this.waterMesh);
    }

    buildSkyDome() {
        // Vibrant azure skybox with procedural gradient
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x4444ff, 0.6);
        this.scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(200, 300, 100);
        dirLight.castShadow = true;
        
        // Massive shadow map for high-fidelity rendering
        dirLight.shadow.mapSize.width = 4096;
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 1000;
        const d = 400;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.bias = -0.0005;
        this.scene.add(dirLight);

        // Sky dome visual
        const skyGeo = new THREE.SphereGeometry(900, 32, 15);
        const skyMat = new THREE.MeshBasicMaterial({ color: 0x55ccff, side: THREE.BackSide });
        const skyDome = new THREE.Mesh(skyGeo, skyMat);
        this.scene.add(skyDome);
    }

    buildFlora() {
        // Procedurally generating Palm Trees
        const trunkGeo = new THREE.CylinderGeometry(1.5, 2.5, 15, 8);
        const trunkMat = new THREE.MeshStandardMaterial({color: 0x6b4226, roughness: 1.0});
        
        const leafGeo = new THREE.PlaneGeometry(6, 15, 4, 4);
        leafGeo.translate(0, 7.5, 0); // Offset origin to base
        leafGeo.rotateX(-Math.PI/4); // Bend outwards
        const leafMat = new THREE.MeshStandardMaterial({color: 0x228b22, side: THREE.DoubleSide});

        for(let i=0; i<80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = MathUtils.randomRange(60, this.islandRadius * 0.9);
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            // Raycast down to find terrain height for exact placement
            const height = this.getTerrainHeightAt(x, z);
            if (height < 2 || height > 28) continue; // Don't spawn in water or steep peaks

            const treeGroup = new THREE.Group();
            
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 7.5;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Generate leaves radially
            for(let j=0; j<6; j++) {
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.y = 14;
                leaf.rotation.y = (j / 6) * Math.PI * 2;
                leaf.castShadow = true;
                treeGroup.add(leaf);
            }

            treeGroup.position.set(x, height, z);
            
            // Collision cylinder for physics
            treeGroup.userData.collisionRadius = 2.5;
            this.scene.add(treeGroup);
            this.collisionMeshes.push({ type: 'cylinder', pos: new THREE.Vector3(x, height, z), r: 2.5 });
        }
    }

    buildInfrastructure() {
        // Bumpers (Purple, Green, Blue from reference)
        const bumperColors = [0x9900ff, 0x00ff00, 0x0000ff];
        const bumperGeo = new THREE.BoxGeometry(40, 4, 2);
        
        for(let i=0; i<12; i++) {
            const mat = new THREE.MeshStandardMaterial({ color: bumperColors[i % 3], metalness: 0.2, roughness: 0.3 });
            const mesh = new THREE.Mesh(bumperGeo, mat);
            
            const angle = (i / 12) * Math.PI * 2;
            const x = Math.cos(angle) * 120;
            const z = Math.sin(angle) * 120;
            const y = this.getTerrainHeightAt(x, z);
            
            mesh.position.set(x, y + 2, z);
            mesh.lookAt(0, y+2, 0); // Face center
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            this.scene.add(mesh);
            
            // Precise OBB collision data (Simplified to spheres for performance in this prototype)
            this.collisionMeshes.push({ type: 'box_approx', pos: mesh.position.clone(), size: 20 });
        }

        // Jump Ramps
        const rampGeo = new THREE.BufferGeometry();
        // Define explicit vertices for a wedge ramp
        const vertices = new Float32Array([
            -10, 0, 10,   10, 0, 10,   -10, 0, -10,
            10, 0, -10,   -10, 6, -10,  10, 6, -10
        ]);
        const indices = [
            0,1,2, 1,3,2, // Bottom
            0,4,1, 1,4,5, // Ramp face
            0,2,4,        // Left side
            1,5,3,        // Right side
            2,3,4, 3,5,4  // Back
        ];
        rampGeo.setIndex(indices);
        rampGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        rampGeo.computeVertexNormals();

        const rampMat = new THREE.MeshStandardMaterial({color: 0xffffff, vertexColors: false});
        // Paint red/white stripes procedurally
        
        for(let i=0; i<4; i++) {
            const mesh = new THREE.Mesh(rampGeo, rampMat);
            const rOffset = 80;
            const pos = [
                [0, rOffset], [0, -rOffset], [rOffset, 0], [-rOffset, 0]
            ];
            mesh.position.set(pos[i][0], this.getTerrainHeightAt(pos[i][0], pos[i][1]), pos[i][1]);
            mesh.lookAt(0, mesh.position.y, 0);
            mesh.castShadow = true;
            this.scene.add(mesh);
        }
    }

    getTerrainHeightAt(x, z) {
        // Mathematical approximation aligned with mesh generation
        const dist = Math.sqrt(x*x + z*z);
        let falloff = Math.max(0, 1 - Math.pow(dist / this.islandRadius, 2));
        let el = this.simplex.noise2D(x*0.005, z*0.005)*20 + this.simplex.noise2D(x*0.02, z*0.02)*5;
        let finalY = (el + 10) * falloff;
        
        const td1 = Math.abs(Math.sin(x*0.01)*50 + z);
        const td2 = Math.abs(Math.cos(z*0.01)*50 + x);
        if(Math.min(td1, td2) < 30 && dist < this.islandRadius*0.8) {
            finalY = MathUtils.lerp(finalY, 5, 0.8);
        }
        return finalY;
    }

    update(time) {
        if(this.waterUniforms) this.waterUniforms.uTime.value = time * 2.0;
        // Animate Lava Texture translation
    }
}

/**
 * Advanced Vehicle Physics Controller
 */
class KinematicActor {
    constructor(uid, profile, isLocal, startNode) {
        this.uid = uid;
        this.isLocal = isLocal;
        
        // Statistical Mapping
        const stats = profile.stats;
        this.tuning = {
            maxVel: 80 + (stats.spd * 5),
            accelForce: 60 + (stats.acc * 4),
            handling: 1.5 + (stats.hnd * 0.1),
            frictionGround: 0.96,
            frictionAir: 0.99,
            gravity: -120,
            jumpForce: 45
        };

        this.physicsData = {
            velocity: new THREE.Vector3(),
            angularVelocity: 0,
            isGrounded: false,
            surfaceNormal: new THREE.Vector3(0,1,0),
            driftFactor: 0
        };

        this.state = {
            hp: 100,
            invulnTimer: 0,
            activeItem: 0
        };

        this.buildRig(profile.pigment);
        this.meshGroup.position.copy(startNode);
        
        // Raycaster for advanced ground detection and suspension
        this.raycaster = new THREE.Raycaster();
        this.raycaster.far = 5.0; // Suspension travel distance
    }

    buildRig(chassisColor) {
        this.meshGroup = new THREE.Group();
        
        // Main Chassis Geometry (High detail composite)
        const bodyGeo = new THREE.BoxGeometry(3.5, 1.2, 5.5);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: chassisColor, 
            roughness: 0.2, 
            metalness: 0.8,
            clearcoat: 1.0
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.0;
        body.castShadow = true;
        
        // Engine block
        const engineGeo = new THREE.BoxGeometry(2, 1.5, 2);
        const engineMat = new THREE.MeshStandardMaterial({color: 0x333333, metalness: 0.9});
        const engine = new THREE.Mesh(engineGeo, engineMat);
        engine.position.set(0, 1.8, -1.5);
        engine.castShadow = true;

        // Exhaust pipes
        const pipeGeo = new THREE.CylinderGeometry(0.2, 0.2, 1);
        pipeGeo.rotateX(Math.PI/2);
        const p1 = new THREE.Mesh(pipeGeo, engineMat); p1.position.set(0.8, 1.5, -2.6);
        const p2 = new THREE.Mesh(pipeGeo, engineMat); p2.position.set(-0.8, 1.5, -2.6);

        this.meshGroup.add(body, engine, p1, p2);

        // Tires
        const wheelGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.8, 24);
        wheelGeo.rotateZ(Math.PI/2);
        const wheelMat = new THREE.MeshStandardMaterial({color: 0x111111, roughness: 0.9});
        
        this.wheels = [];
        const wOffsets = [
            [2.2, 1.0, 2.0], [-2.2, 1.0, 2.0], // Front
            [2.2, 1.0, -2.0], [-2.2, 1.0, -2.0] // Rear
        ];
        
        wOffsets.forEach(pos => {
            const w = new THREE.Mesh(wheelGeo, wheelMat);
            w.position.set(...pos);
            w.castShadow = true;
            this.meshGroup.add(w);
            this.wheels.push(w);
        });

        // Add to global scene graph
        EnvironmentCore.sceneGraph.add(this.meshGroup);
    }

    applyNetworkInput(payload) {
        this.remoteInput = payload;
    }

    tick(dt, terrainMesh) {
        if (this.state.invulnTimer > 0) {
            this.state.invulnTimer -= dt;
            this.meshGroup.visible = Math.floor(this.state.invulnTimer * 10) % 2 === 0;
        } else {
            this.meshGroup.visible = true;
        }

        const input = this.isLocal ? InputManager.serialize() : (this.remoteInput || {w:0,s:0,a:0,d:0,sp:0});

        // Complex Raycast Physics
        // Cast a ray downwards from center of mass to detect terrain surface
        this.raycaster.set(this.meshGroup.position.clone().add(new THREE.Vector3(0, 2, 0)), new THREE.Vector3(0, -1, 0));
        const intersects = this.raycaster.intersectObject(terrainMesh);

        let groundHeight = -100;
        this.physicsData.isGrounded = false;

        if (intersects.length > 0) {
            groundHeight = intersects[0].point.y;
            this.physicsData.surfaceNormal.copy(intersects[0].face.normal);
            
            // Suspension logic
            if (this.meshGroup.position.y - groundHeight <= 1.0) {
                this.physicsData.isGrounded = true;
                this.meshGroup.position.y = groundHeight + 1.0;
                this.physicsData.velocity.y = 0;
                
                // Align to surface normal (Pitch & Roll)
                const targetQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), this.physicsData.surfaceNormal);
                // Keep the Y-axis rotation (Yaw) from user steering
                const yawQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), this.meshGroup.rotation.y);
                targetQuat.multiply(yawQuat);
                
                this.meshGroup.quaternion.slerp(targetQuat, 10 * dt);
            }
        }

        // Steering Logic
        // Steering Logic - Optimized for High Sensitivity
            if (this.physicsData.isGrounded) {
                let turnAmt = 0;
                // 1. Increased base sensitivity (multiplied by 2.5)
                const sensitivity = this.tuning.handling * 2.5; 
                
                if (input.a) turnAmt += sensitivity * dt;
                if (input.d) turnAmt -= sensitivity * dt;
                
                // 2. Modified speed check: allow turning even at very low speeds
                const currentSpeed = this.physicsData.velocity.length();
                const turnDampening = MathUtils.clamp(currentSpeed * 0.5, 0.3, 1.0);
                turnAmt *= turnDampening;
                
                // 3. Proper reverse steering toggle
                const localZ = new THREE.Vector3(0,0,1).applyQuaternion(this.meshGroup.quaternion);
                const isMovingBackwards = this.physicsData.velocity.dot(localZ) < -0.1;
                if (isMovingBackwards) turnAmt *= -1;
            
                this.meshGroup.rotateY(turnAmt);
                
                // Visual wheel sync (exaggerated for feedback)
                this.wheels[0].rotation.y = (input.a ? 0.6 : (input.d ? -0.6 : 0));
                this.wheels[1].rotation.y = (input.a ? 0.6 : (input.d ? -0.6 : 0));
            }

        // Acceleration Logic
        const forwardDir = new THREE.Vector3(0,0,1).applyQuaternion(this.meshGroup.quaternion);
        if (this.physicsData.isGrounded) {
            let force = 0;
            if (input.w) force += this.tuning.accelForce;
            if (input.s) force -= this.tuning.accelForce * 0.7; // Brake/Reverse
            
            this.physicsData.velocity.add(forwardDir.multiplyScalar(force * dt));
            this.physicsData.velocity.multiplyScalar(this.tuning.frictionGround);
        } else {
            // Airborn physics (Gravity)
            this.physicsData.velocity.y += this.tuning.gravity * dt;
            this.physicsData.velocity.x *= this.tuning.frictionAir;
            this.physicsData.velocity.z *= this.tuning.frictionAir;
        }

        // Clamp Maximum Speed
        const horizontalVel = new THREE.Vector2(this.physicsData.velocity.x, this.physicsData.velocity.z);
        if (horizontalVel.length() > this.tuning.maxVel) {
            horizontalVel.normalize().multiplyScalar(this.tuning.maxVel);
            this.physicsData.velocity.x = horizontalVel.x;
            this.physicsData.velocity.z = horizontalVel.y;
        }

        // Apply Kinematic Integration
        this.meshGroup.position.add(this.physicsData.velocity.clone().multiplyScalar(dt));

        // Wheel spinning animation
        const speed = this.physicsData.velocity.length();
        this.wheels.forEach(w => w.rotation.x += speed * dt);

        // Action / Item deployment
        if (input.sp && this.isLocal && this.state.activeItem !== 0) {
            EnvironmentCore.deployItemCommand(this.uid, this.state.activeItem);
            this.state.activeItem = 0;
            input.sp = 0; // debounce
        }
        
        // Hazard Death Boundary (Water/Lava)
        if (this.meshGroup.position.y < -2 || (Math.abs(this.meshGroup.position.x) < 40 && Math.abs(this.meshGroup.position.z) < 40 && this.meshGroup.position.y < 6)) {
            // Reset logic
            this.meshGroup.position.set(0, 30, 0); // Drop from sky
            this.physicsData.velocity.set(0,0,0);
            if (this.isLocal && AppState.networkRole === 'HOST') {
                AppState.entityRegistry[this.uid].score = Math.max(0, AppState.entityRegistry[this.uid].score - 10);
            }
        }
    }

    applyImpactForce(originPos, strength) {
        if (this.state.invulnTimer > 0) return;
        
        const dir = this.meshGroup.position.clone().sub(originPos).normalize();
        dir.y = 1.0; // Knock upward
        this.physicsData.velocity.add(dir.multiplyScalar(strength));
        this.state.invulnTimer = 2.0; // 2 seconds iframes
        
        if (this.isLocal) InterfaceController.triggerVisualDamage();
    }
}

/**
 * Item Box Generator & Logic System
 */
class CollectibleSubsystem {
    constructor(scene) {
        this.scene = scene;
        this.nodes = [];
        this.constructGeometry();
    }

    constructGeometry() {
        const boxGeo = new THREE.BoxGeometry(3, 3, 3);
        
        // Create procedural ? texture
        const cvs = document.createElement('canvas');
        cvs.width = 256; cvs.height = 256;
        const ctx = cvs.getContext('2d');
        
        // Base gradient
        const grad = ctx.createLinearGradient(0,0,256,256);
        grad.addColorStop(0, '#00e5ff');
        grad.addColorStop(1, '#ff0055');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,256,256);
        
        // Question mark
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 150px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', 128, 128);
        
        const tex = new THREE.CanvasTexture(cvs);
        const boxMat = new THREE.MeshStandardMaterial({
            map: tex,
            emissive: 0x222222,
            metalness: 0.5,
            roughness: 0.2
        });

        // Distribute items across the island
        if (AppState.networkRole === 'HOST') {
            for(let i=0; i<25; i++) {
                const a = Math.random() * Math.PI * 2;
                const r = MathUtils.randomRange(20, 200);
                const x = Math.cos(a) * r;
                const z = Math.sin(a) * r;
                const y = EnvironmentCore.terrainModule.getTerrainHeightAt(x, z) + 3;
                
                const mesh = new THREE.Mesh(boxGeo, boxMat);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                this.scene.add(mesh);
                
                this.nodes.push({ id: i, mesh, active: true, respawnCd: 0 });
            }
        }
    }

    tick(dt) {
        const time = Date.now() * 0.003;
        this.nodes.forEach(node => {
            if (node.active) {
                node.mesh.rotation.y += 2 * dt;
                node.mesh.rotation.x = Math.sin(time + node.id) * 0.3;
                node.mesh.position.y += Math.cos(time * 2 + node.id) * 0.05;
                node.mesh.visible = true;
            } else if (AppState.networkRole === 'HOST') {
                node.respawnCd -= dt;
                if (node.respawnCd <= 0) node.active = true;
                node.mesh.visible = false;
            }
        });
    }

    evaluateProximity(actor) {
        if (AppState.networkRole !== 'HOST') return;
        
        this.nodes.forEach(node => {
            if (node.active && actor.meshGroup.position.distanceTo(node.mesh.position) < 5.0) {
                node.active = false;
                node.respawnCd = 10.0; // 10 seconds respawn
                
                // RNG Item: 1 (Missile), 2 (Mine), 3 (Boost)
                const lootClass = Math.floor(MathUtils.randomRange(1, 4));
                actor.state.activeItem = lootClass;
                
                AppState.entityRegistry[actor.uid].score += 5; // Points for boxes
                
                NetworkController.transmitAll({
                    op: 'ARENA_EVENT',
                    payload: { type: 'LOOT_ACQUIRE', uid: actor.uid, class: lootClass }
                });
                
                if (actor.isLocal) EngineCore.processNetworkEvent({ type: 'LOOT_ACQUIRE', uid: actor.uid, class: lootClass });
            }
        });
    }

    getStates() { return this.nodes.map(n => n.active); }
    applyStates(dataArr) {
        dataArr.forEach((isActive, idx) => {
            if(this.nodes[idx]) this.nodes[idx].active = isActive;
        });
    }
}

/**
 * Combat Weapons & Hazards Subsystem
 */
class OrdnanceSubsystem {
    constructor(scene) {
        this.scene = scene;
        this.activeOrdnance = [];
        
        // Caching geometries for performance
        this.geoMissile = new THREE.CylinderGeometry(0.8, 0.8, 3.5, 8);
        this.geoMissile.rotateX(Math.PI/2);
        this.matMissile = new THREE.MeshStandardMaterial({color: 0xff0055, emissive: 0x550000});
        
        this.geoMine = new THREE.SphereGeometry(1.5, 12, 12);
        this.matMine = new THREE.MeshStandardMaterial({color: 0x111111, bumpScale: 0.5});
    }

    spawnProjectile(originPos, directionVec, ownerId) {
        const mesh = new THREE.Mesh(this.geoMissile, this.matMissile);
        mesh.position.copy(originPos);
        mesh.lookAt(originPos.clone().add(directionVec));
        
        this.scene.add(mesh);
        this.activeOrdnance.push({
            type: 1,
            mesh: mesh,
            dir: directionVec,
            owner: ownerId,
            ttl: 3.0 // 3 seconds lifespan
        });
    }

    spawnStaticHazard(originPos, ownerId) {
        const mesh = new THREE.Mesh(this.geoMine, this.matMine);
        mesh.position.copy(originPos);
        this.scene.add(mesh);
        this.activeOrdnance.push({
            type: 2,
            mesh: mesh,
            owner: ownerId,
            ttl: 30.0 // 30 seconds lifespan
        });
    }

    tick(dt) {
        for (let i = this.activeOrdnance.length - 1; i >= 0; i--) {
            const ord = this.activeOrdnance[i];
            ord.ttl -= dt;
            
            if (ord.type === 1) { // Missile processing
                ord.mesh.position.add(ord.dir.clone().multiplyScalar(150 * dt)); // High speed
                
                // Spawn particle trail (Simulated via simple object generation)
                EnvironmentCore.particleEngine.emit(ord.mesh.position, 0xffaa00, 1);
            }
            
            if (ord.ttl <= 0) {
                this.scene.remove(ord.mesh);
                this.activeOrdnance.splice(i, 1);
            }
        }
    }

    evaluateDetonation(actor) {
        if (AppState.networkRole !== 'HOST') return;

        for (let i = this.activeOrdnance.length - 1; i >= 0; i--) {
            const ord = this.activeOrdnance[i];
            
            // Immunity logic for owner's own missile right after firing
            if (ord.owner === actor.uid && ord.type === 1 && ord.ttl > 2.8) continue;
            
            if (actor.meshGroup.position.distanceTo(ord.mesh.position) < 6.0) {
                // Detonate
                actor.applyImpactForce(ord.mesh.position, 80); // Massive knockback
                
                EnvironmentCore.particleEngine.emitExplosion(ord.mesh.position);
                this.scene.remove(ord.mesh);
                this.activeOrdnance.splice(i, 1);
                
                // Scoring deduction
                AppState.entityRegistry[actor.uid].score = Math.max(0, AppState.entityRegistry[actor.uid].score - 15);
                if (AppState.entityRegistry[ord.owner]) AppState.entityRegistry[ord.owner].score += 25;
                
                NetworkController.transmitAll({
                    op: 'ARENA_EVENT',
                    payload: { type: 'DETONATION', uid: actor.uid, pos: ord.mesh.position.toArray() }
                });
                
                if (actor.isLocal) EngineCore.processNetworkEvent({ type: 'DETONATION', uid: actor.uid, pos: ord.mesh.position.toArray() });
            }
        }
    }

    getStates() { 
        return this.activeOrdnance.map(o => ({ 
            t: o.type, 
            p: o.mesh.position.toArray(), 
            d: o.dir ? o.dir.toArray() : null 
        })); 
    }
    
    applyStates(dataArr) {
        // Visual sync only for clients
        this.activeOrdnance.forEach(o => this.scene.remove(o.mesh));
        this.activeOrdnance = [];
        
        dataArr.forEach(data => {
            const pos = new THREE.Vector3().fromArray(data.p);
            let mesh;
            if (data.t === 1) {
                mesh = new THREE.Mesh(this.geoMissile, this.matMissile);
                mesh.position.copy(pos);
                if (data.d) mesh.lookAt(pos.clone().add(new THREE.Vector3().fromArray(data.d)));
            } else {
                mesh = new THREE.Mesh(this.geoMine, this.matMine);
                mesh.position.copy(pos);
            }
            this.scene.add(mesh);
            this.activeOrdnance.push({ mesh });
        });
    }
}

/**
 * Lightweight CPU Particle System
 */
class VFXSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
        this.baseGeo = new THREE.BoxGeometry(1, 1, 1);
    }
    
    emit(pos, colorHex, count) {
        const mat = new THREE.MeshBasicMaterial({color: colorHex});
        for(let i=0; i<count; i++) {
            const mesh = new THREE.Mesh(this.baseGeo, mat);
            mesh.position.copy(pos);
            const vel = new THREE.Vector3(
                MathUtils.randomRange(-0.5, 0.5),
                MathUtils.randomRange(0.2, 1.0),
                MathUtils.randomRange(-0.5, 0.5)
            );
            this.scene.add(mesh);
            this.particles.push({ mesh, vel, life: 1.0 });
        }
    }
    
    emitExplosion(pos) {
        this.emit(pos, 0xff0055, 30);
        this.emit(pos, 0xffdd00, 20);
        this.emit(pos, 0x111111, 15);
    }
    
    tick(dt) {
        for(let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life -= dt * 2.0;
            
            p.mesh.position.add(p.vel);
            p.mesh.scale.multiplyScalar(0.92);
            
            if(p.life <= 0) {
                this.scene.remove(p.mesh);
                this.particles.splice(i, 1);
            }
        }
    }
}

/* ==========================================================================
   PRIMARY ENGINE COORDINATOR
   ========================================================================== */
const EnvironmentCore = {
    sceneGraph: null,
    cameraRig: null,
    renderer: null,
    terrainModule: null,
    itemSubsystem: null,
    hazardSubsystem: null,
    particleEngine: null,
    actors: {},
    localController: null
};

const EngineCore = {
    animationHandle: null,
    lastTime: 0,
    accumulator: 0,
    dtFixed: 1 / 60,

    deployArena: () => {
        if (AppState.networkRole !== 'HOST') return;
        const genesisSeed = Math.random();
        NetworkController.transmitAll({ op: 'DEPLOY_CMD', payload: { seed: genesisSeed } });
        EngineCore.initializeGraphics(genesisSeed);
    },

    initializeGraphics: (seed) => {
        InterfaceController.navigate(null);
        document.getElementById('hud-layer').style.display = 'block';
        document.getElementById('reticle-center').style.display = 'block';
        AppState.engineStatus = 'ACTIVE';

        // Three.js Core Init
        const canvas = document.getElementById('engine-canvas');
        EnvironmentCore.renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, powerPreference: "high-performance" });
        EnvironmentCore.renderer.setSize(window.innerWidth, window.innerHeight);
        EnvironmentCore.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        EnvironmentCore.renderer.shadowMap.enabled = true;
        EnvironmentCore.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        EnvironmentCore.sceneGraph = new THREE.Scene();
        EnvironmentCore.sceneGraph.fog = new THREE.FogExp2(0x55ccff, 0.002); // Horizon fade

        EnvironmentCore.cameraRig = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);

        // Modules Instantiation
        EnvironmentCore.terrainModule = new TerrainGenerator(EnvironmentCore.sceneGraph, seed);
        EnvironmentCore.itemSubsystem = new CollectibleSubsystem(EnvironmentCore.sceneGraph);
        EnvironmentCore.hazardSubsystem = new OrdnanceSubsystem(EnvironmentCore.sceneGraph);
        EnvironmentCore.particleEngine = new VFXSystem(EnvironmentCore.sceneGraph);

        // Actor Spawning
        const participantArray = Object.values(AppState.entityRegistry);
        const radius = 40;
        
        participantArray.forEach((entData, index) => {
            const theta = (index / participantArray.length) * Math.PI * 2;
            const startX = Math.cos(theta) * radius;
            const startZ = Math.sin(theta) * radius;
            const startY = EnvironmentCore.terrainModule.getTerrainHeightAt(startX, startZ) + 5;
            const spawnPos = new THREE.Vector3(startX, startY, startZ);
            
            const isSelf = entData.id === AppState.localIdentifier;
            const actor = new KinematicActor(entData.id, entData, isSelf, spawnPos);
            
            // Align rotation to face center initially
            actor.meshGroup.lookAt(0, startY, 0);
            
            EnvironmentCore.actors[entData.id] = actor;
            if (isSelf) EnvironmentCore.localController = actor;
        });

        window.addEventListener('resize', EngineCore.handleViewportResize);
        InputManager.initialize();

        EngineCore.lastTime = performance.now();
        EngineCore.executePipeline();
        
        InterfaceController.pushNotification('ARENA INITIALIZATION COMPLETE', 'success');
    },

    executePipeline: () => {
        if (AppState.engineStatus !== 'ACTIVE') return;
        EngineCore.animationHandle = requestAnimationFrame(EngineCore.executePipeline);

        const now = performance.now();
        let frameTime = (now - EngineCore.lastTime) / 1000.0;
        EngineCore.lastTime = now;
        
        if (frameTime > 0.25) frameTime = 0.25; // Prevent spiral of death on lag
        EngineCore.accumulator += frameTime;

        // Fixed timestep physics update
        while (EngineCore.accumulator >= EngineCore.dtFixed) {
            EngineCore.tickLogic(EngineCore.dtFixed);
            EngineCore.accumulator -= EngineCore.dtFixed;
        }

        // Camera Tracking (Smooth follow)
        if (EnvironmentCore.localController) {
            const targetKart = EnvironmentCore.localController.meshGroup;
            
            // Dynamic Camera Positioning
            const camOffset = new THREE.Vector3(0, 8, -18);
            camOffset.applyQuaternion(targetKart.quaternion);
            const desiredCamPos = targetKart.position.clone().add(camOffset);
            
            EnvironmentCore.cameraRig.position.lerp(desiredCamPos, 0.1);
            
            const lookTarget = targetKart.position.clone().add(new THREE.Vector3(0, 3, 0));
            EnvironmentCore.cameraRig.lookAt(lookTarget);
            
            // Speed based FOV warping
            const spd = EnvironmentCore.localController.physicsData.velocity.length();
            const targetFov = 75 + (spd * 0.15);
            EnvironmentCore.cameraRig.fov = MathUtils.lerp(EnvironmentCore.cameraRig.fov, targetFov, 0.1);
            EnvironmentCore.cameraRig.updateProjectionMatrix();
        }

        // Render pass
        EnvironmentCore.renderer.render(EnvironmentCore.sceneGraph, EnvironmentCore.cameraRig);
    },

    tickLogic: (dt) => {
        // Environment animation
        EnvironmentCore.terrainModule.update(performance.now() * 0.001);
        EnvironmentCore.itemSubsystem.tick(dt);
        EnvironmentCore.hazardSubsystem.tick(dt);
        EnvironmentCore.particleEngine.tick(dt);

        // Actor Physics
        for (let uid in EnvironmentCore.actors) {
            const act = EnvironmentCore.actors[uid];
            act.tick(dt, EnvironmentCore.terrainModule.terrainMesh);
            
            if (AppState.networkRole === 'HOST') {
                EnvironmentCore.itemSubsystem.evaluateProximity(act);
                EnvironmentCore.hazardSubsystem.evaluateDetonation(act);
            }
        }

        // Networking Sync
        if (AppState.networkRole === 'HOST') {
            // Host sends canonical state 30 times a second
            if (Math.random() < (AppState.tickRateHz * dt)) { 
                NetworkController.synchronizeArenaState();
            }
        } else {
            // Client sends input 30 times a second
            if (Math.random() < (AppState.tickRateHz * dt)) {
                NetworkController.transmitInput();
            }
        }
        
        InterfaceController.updateHUD();
    },

    deployItemCommand: (uid, itemClass) => {
        const actor = EnvironmentCore.actors[uid];
        if (!actor) return;
        
        const fwd = new THREE.Vector3(0,0,1).applyQuaternion(actor.meshGroup.quaternion);
        
        if (AppState.networkRole === 'HOST') {
            if (itemClass === 1) {
                const spawnPos = actor.meshGroup.position.clone().add(fwd.clone().multiplyScalar(6));
                spawnPos.y += 2;
                EnvironmentCore.hazardSubsystem.spawnProjectile(spawnPos, fwd, uid);
            } else if (itemClass === 2) {
                const spawnPos = actor.meshGroup.position.clone().sub(fwd.clone().multiplyScalar(5));
                EnvironmentCore.hazardSubsystem.spawnStaticHazard(spawnPos, uid);
            }
        }
        
        if (itemClass === 3) {
            // Turbo Boost (Client side predict allowed)
            actor.physicsData.velocity.add(fwd.multiplyScalar(150));
            EnvironmentCore.particleEngine.emit(actor.meshGroup.position, 0x00e5ff, 40);
        }
        
        // Broadcast usage intent
        NetworkController.transmitAll({
            op: 'ARENA_EVENT',
            payload: { type: 'ITEM_DEPLOY', uid: uid, class: itemClass }
        });
    },

    processNetworkEvent: (payload) => {
        if (payload.type === 'LOOT_ACQUIRE') {
            if (EnvironmentCore.actors[payload.uid]) {
                EnvironmentCore.actors[payload.uid].state.activeItem = payload.class;
                if (payload.uid === AppState.localIdentifier) {
                    DataStore.transactFunds(25);
                }
            }
        } else if (payload.type === 'DETONATION') {
            const pos = new THREE.Vector3().fromArray(payload.pos);
            EnvironmentCore.particleEngine.emitExplosion(pos);
            if (EnvironmentCore.actors[payload.uid]) {
                EnvironmentCore.actors[payload.uid].applyImpactForce(pos, 80);
            }
        } else if (payload.type === 'ITEM_DEPLOY') {
            const act = EnvironmentCore.actors[payload.uid];
            if (act && payload.class === 3) {
                EnvironmentCore.particleEngine.emit(act.meshGroup.position, 0x00e5ff, 40);
            }
        }
    },

    applyInterpolationSnapshot: (snap) => {
        for (let uid in snap.kinematics) {
            if (uid === AppState.localIdentifier) continue; // Let client predict own movement
            
            const kine = snap.kinematics[uid];
            const act = EnvironmentCore.actors[uid];
            
            if (act) {
                // Hard snap for prototype. Production would lerp.
                act.meshGroup.position.fromArray(kine.p);
                act.meshGroup.quaternion.fromArray(kine.q);
                act.physicsData.velocity.fromArray(kine.v);
            }
        }
        
        for (let uid in snap.entities) {
            if (AppState.entityRegistry[uid]) {
                AppState.entityRegistry[uid].score = snap.entities[uid];
            }
        }
        
        if (AppState.networkRole === 'CLIENT') {
            EnvironmentCore.itemSubsystem.applyStates(snap.environment.pickups);
            EnvironmentCore.hazardSubsystem.applyStates(snap.environment.hazards);
        }
    },

    terminateArena: () => {
        if (EngineCore.animationHandle) cancelAnimationFrame(EngineCore.animationHandle);
        
        document.getElementById('hud-layer').style.display = 'none';
        document.getElementById('reticle-center').style.display = 'none';
        
        if (EnvironmentCore.renderer) {
            EnvironmentCore.renderer.dispose();
            const canvas = document.getElementById('engine-canvas');
            const parent = canvas.parentNode;
            parent.removeChild(canvas);
            const newCanvas = document.createElement('canvas');
            newCanvas.id = 'engine-canvas';
            parent.appendChild(newCanvas);
        }
        
        EnvironmentCore.actors = {};
        EnvironmentCore.localController = null;
    },

    handleViewportResize: () => {
        if (!EnvironmentCore.cameraRig || !EnvironmentCore.renderer) return;
        EnvironmentCore.cameraRig.aspect = window.innerWidth / window.innerHeight;
        EnvironmentCore.cameraRig.updateProjectionMatrix();
        EnvironmentCore.renderer.setSize(window.innerWidth, window.innerHeight);
    }
};
